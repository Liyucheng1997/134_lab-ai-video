<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI 视频自动化 · 流水线</title>
<style>
  :root{
    --bg1:#e8eefb;--bg2:#f3eefb;
    --card:rgba(255,255,255,.55);--soft:rgba(255,255,255,.5);
    --glass:rgba(255,255,255,.72);
    --ink:#222a39;--mut:#6f7892;--line:rgba(140,150,195,.22);
    --brand:#5566ff;--brand2:#8a5cf6;--flow:#11c4d6;
    --ok:#10b981;--run:#f5a623;--err:#f4476b;
    --sh:0 16px 44px rgba(60,72,140,.18);--sh-sm:0 8px 26px rgba(60,72,140,.12);
    --blur:saturate(170%) blur(22px);
  }
  *{box-sizing:border-box}
  body{margin:0;color:var(--ink);font:15px/1.65 "Microsoft YaHei",system-ui,"Segoe UI",sans-serif;
    background:
      radial-gradient(900px 460px at 8% -6%,rgba(85,102,255,.30),transparent 60%),
      radial-gradient(820px 460px at 102% 4%,rgba(138,92,246,.28),transparent 55%),
      radial-gradient(700px 520px at 50% 108%,rgba(17,196,214,.22),transparent 60%),
      linear-gradient(135deg,var(--bg1),var(--bg2));background-attachment:fixed;min-height:100vh}
  .wrap{max-width:1680px;margin:0 auto;padding:30px 26px 90px}
  h1{font-size:27px;margin:0 0 4px;font-weight:800;letter-spacing:.5px;
    background:linear-gradient(120deg,var(--brand),var(--brand2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--mut);margin:0 0 20px;font-size:14px}
  .app{display:grid;grid-template-columns:340px minmax(0,1fr);gap:20px;align-items:start}
  @media(max-width:980px){.app{grid-template-columns:1fr}.queue-panel{position:static!important;max-height:none!important}}
  .queue-panel{position:sticky;top:22px;max-height:calc(100vh - 44px);overflow:auto;background:var(--card);
    border:1px solid var(--glass);border-radius:18px;box-shadow:var(--sh-sm);padding:16px;backdrop-filter:var(--blur);
    -webkit-backdrop-filter:var(--blur)}
  .qhead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
  .qtitle{font-size:17px;font-weight:800}
  .qsum{font-size:12px;color:var(--mut)}
  .qinput{min-height:96px}
  .qactions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .qactions .btn{margin-top:0;padding:9px 12px;font-size:13px;border-radius:10px}
  .qactions .btn.ghost{padding:8px 11px}
  .qlist{display:flex;flex-direction:column;gap:10px;margin-top:14px}
  .qitem{border:1px solid var(--line);background:var(--soft);border-radius:12px;padding:10px;cursor:pointer}
  .qitem.active{border-color:var(--brand);background:rgba(255,255,255,.84);box-shadow:0 8px 20px rgba(85,102,255,.14)}
  .qitem.running{border-color:rgba(245,166,35,.6)}
  .qitem.done{border-color:rgba(16,185,129,.5)}
  .qitem.error{border-color:rgba(244,71,107,.6)}
  .qitem.active,.qitem.done.active,.qitem.running.active,.qitem.error.active{border-color:var(--brand);background:#fff;box-shadow:0 8px 20px rgba(85,102,255,.16)}
  .qtop{display:flex;align-items:center;gap:8px}
  .qidx{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;flex:none;background:#fff;border:1px solid var(--line);
    color:var(--mut);font-size:12px;font-weight:800}
  .qname{min-width:0;flex:1;font-size:13px;font-weight:700;line-height:1.35;word-break:break-word}
  .qstatus{font-size:11px;border-radius:20px;padding:2px 8px;background:#fff;color:var(--mut);white-space:nowrap}
  .qitem.running .qstatus{background:rgba(245,166,35,.14);color:#b36d00}
  .qitem.done .qstatus{background:rgba(16,185,129,.14);color:var(--ok)}
  .qitem.error .qstatus{background:rgba(244,71,107,.12);color:var(--err)}
  .qmeta{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px;margin-top:8px;font-size:12px;color:var(--mut)}
  .qbar{height:5px;background:#e1e5f1;border-radius:5px;overflow:hidden;margin-top:8px}
  .qbar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--flow))}
  .qtools{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .qtool{border:1px solid var(--line);background:#fff;border-radius:8px;padding:4px 7px;font-size:12px;cursor:pointer;color:var(--ink)}
  .qtool:disabled{opacity:.45;cursor:not-allowed}
  .main{min-width:0}

  /* 顶部控制条 + 产线状态 */
  .top{display:flex;align-items:center;gap:18px;background:var(--card);border:1px solid var(--glass);
    border-radius:18px;box-shadow:var(--sh-sm);padding:14px 18px;margin-bottom:22px;flex-wrap:wrap;
    backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur)}
  .runall{padding:12px 24px;border:0;border-radius:12px;cursor:pointer;color:#fff;font-size:15px;font-weight:700;
    background:linear-gradient(135deg,var(--brand),var(--brand2));box-shadow:0 8px 20px rgba(85,102,255,.3);transition:.2s;white-space:nowrap}
  .runall:hover{filter:brightness(1.06);transform:translateY(-1px)}
  .runall:disabled{opacity:.5;cursor:not-allowed;box-shadow:none;transform:none}
  .runall.secondary{background:var(--soft);border:1px solid var(--line);color:var(--ink);box-shadow:none}
  .strip{display:flex;align-items:center;flex:1;min-width:420px}
  .snode{display:flex;align-items:center;gap:8px;cursor:pointer}
  .sdot{width:30px;height:30px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:13px;font-weight:800;
    background:var(--soft);border:1px solid var(--line);color:var(--mut);transition:.25s}
  .sname{font-size:13px;color:var(--mut);white-space:nowrap}
  .sconn{flex:1;height:3px;margin:0 8px;border-radius:3px;background:#e1e5f1;position:relative;overflow:hidden;min-width:18px}
  .sconn.flow::after{content:"";position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,var(--flow),transparent);background-size:50% 100%;
    animation:slide 1.1s linear infinite}
  @keyframes slide{from{background-position:-50% 0}to{background-position:150% 0}}
  .sconn.done{background:var(--ok)}
  .snode.done .sdot{background:var(--ok);border-color:var(--ok);color:#fff}
  .snode.running .sdot{background:var(--run);border-color:var(--run);color:#fff;animation:bp 1.6s infinite}
  .snode.error .sdot{background:var(--err);border-color:var(--err);color:#fff}
  .snode.done .sname,.snode.running .sname{color:var(--ink)}
  @keyframes bp{0%{box-shadow:0 0 0 0 rgba(245,166,35,.5)}70%{box-shadow:0 0 0 9px rgba(245,166,35,0)}100%{box-shadow:0 0 0 0 rgba(245,166,35,0)}}

  /* 2×3 卡片网格：行高一致，卡片等大 */
  #cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;align-items:stretch;
    grid-auto-rows:minmax(440px,auto)}
  @media(max-width:1080px){#cards{grid-template-columns:repeat(2,1fr)}}
  /* 步骤卡（毛玻璃） */
  .card{background:var(--card);border:1px solid var(--glass);border-radius:20px;box-shadow:var(--sh-sm);
    overflow:hidden;transition:box-shadow .25s,border-color .25s,transform .25s;
    backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
    display:flex;flex-direction:column}
  .card:hover{transform:translateY(-2px);box-shadow:var(--sh)}
  .card.running{border-color:rgba(245,166,35,.5)}
  .card.done{border-color:rgba(16,185,129,.4)}
  .chead{display:flex;align-items:center;gap:15px;padding:17px 20px}
  .ring{--p:0;width:46px;height:46px;flex:none;border-radius:50%;display:grid;place-items:center;
    background:radial-gradient(closest-side,#fff 78%,transparent 79%),
      conic-gradient(var(--rc,var(--brand)) calc(var(--p)*1%),#e9ecf6 0)}
  .ico{font-size:17px;font-weight:800;color:var(--mut)}
  .ctit{flex:1;min-width:0}
  .cnm{font-size:17px;font-weight:700}
  .pill{display:inline-block;margin-top:2px;font-size:12px;padding:2px 11px;border-radius:20px;background:var(--soft);color:var(--mut)}
  .card.done .ring{--rc:var(--ok)}.card.done .ico{color:var(--ok)}
  .card.done .pill{background:rgba(16,185,129,.12);color:var(--ok)}
  .card.running .ring{--rc:var(--run)}.card.running .ico{color:var(--run)}
  .card.running .pill{background:rgba(245,166,35,.14);color:#c97f0a}
  .card.error .ring{--rc:var(--err)}.card.error .pill{background:rgba(244,71,107,.12);color:var(--err)}
  .card.ready .ring{--rc:var(--brand)}.card.ready .ico{color:var(--brand)}
  .spin{width:17px;height:17px;border:3px solid rgba(245,166,35,.3);border-top-color:var(--run);border-radius:50%;animation:rot .8s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  .chk{font-size:19px;color:var(--ok)}
  /* 头部细进度条 */
  .hbar{height:3px;background:transparent}
  .hbar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--flow));transition:width .4s}
  .card.done .hbar>i{background:var(--ok)}

  .body{display:block;padding:6px 20px 20px;flex:1}
  label{display:block;font-size:13px;color:var(--mut);margin:13px 0 6px}
  input[type=text],select,textarea{width:100%;padding:11px 13px;background:var(--soft);border:1px solid var(--line);
    border-radius:11px;color:var(--ink);font-size:14px;outline:none;font-family:inherit}
  textarea{resize:vertical;min-height:72px}
  input:focus,select:focus,textarea:focus{border-color:var(--brand);background:#fff}
  .rowf{display:flex;gap:14px;flex-wrap:wrap}.rowf>div{flex:1;min-width:200px}
  .tabs{display:flex;gap:9px;margin-bottom:4px;max-width:420px}
  .tab{flex:1;text-align:center;padding:10px;border:1px solid var(--line);border-radius:11px;cursor:pointer;
    color:var(--mut);background:var(--soft);font-size:14px;transition:.2s}
  .tab.on{color:#fff;border-color:transparent;background:linear-gradient(135deg,var(--brand),var(--brand2))}
  .radio{display:inline-flex;gap:6px;align-items:center;margin-right:18px;font-size:14px;cursor:pointer}
  .drop{border:1.6px dashed #c9d0e6;border-radius:13px;padding:22px;text-align:center;color:var(--mut);cursor:pointer;background:var(--soft);max-width:520px}
  .drop.hover{border-color:var(--brand);color:var(--ink);background:#fff}
  .btn{margin-top:16px;padding:11px 24px;border:0;border-radius:12px;cursor:pointer;color:#fff;font-size:15px;font-weight:700;
    background:linear-gradient(135deg,var(--brand),var(--brand2));box-shadow:0 8px 20px rgba(85,102,255,.28);transition:.2s}
  .btn:hover{filter:brightness(1.05);transform:translateY(-1px)}
  .btn:disabled{opacity:.5;cursor:not-allowed;box-shadow:none;transform:none}
  .btn.ghost{background:var(--soft);border:1px solid var(--line);color:var(--ink);font-weight:600;font-size:14px;padding:10px 16px;margin-top:0;box-shadow:none}
  .body .btn.ghost{margin-top:16px}
  .step-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .hide{display:none!important}
  .bar{height:9px;background:var(--soft);border-radius:6px;overflow:hidden;margin:16px 0 4px}
  .bar>i{display:block;height:100%;width:0;border-radius:6px;background:linear-gradient(90deg,var(--brand),var(--flow));transition:width .4s}
  .pctn{font-size:12px;color:var(--mut)}
  .logtoggle{margin-top:12px;font-size:13px;color:var(--brand);cursor:pointer;user-select:none}
  .log{background:#0f1320;border:1px solid #20263b;border-radius:11px;padding:11px;height:150px;overflow:auto;
    font:12px/1.6 Consolas,monospace;color:#aeb8cf;margin-top:8px}
  .log .s{color:#7aa2ff}
  .preview{margin-top:18px;border-top:1px dashed var(--line);padding-top:16px}
  .ptitle{font-size:13px;color:var(--mut);margin-bottom:9px;font-weight:600}
  .list{max-height:280px;overflow:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  .cue{display:flex;gap:11px;padding:8px 12px;border-bottom:1px solid var(--line);font-size:13px}
  .cue:last-child{border-bottom:0}
  .cue .tc{color:var(--mut);font-family:Consolas,monospace;font-size:11px;white-space:nowrap;padding-top:2px}
  .cue .en{color:var(--mut);font-size:12px}
  video,audio{width:100%;margin-top:8px;border-radius:12px;background:#000}
  img.cover{max-width:520px;width:100%;border-radius:12px;margin-top:8px;box-shadow:var(--sh-sm)}
  .dl{display:inline-block;margin:12px 10px 0 0;padding:11px 20px;border-radius:11px;color:#fff;font-weight:700;text-decoration:none;font-size:14px;
    background:linear-gradient(135deg,var(--ok),#0bbf86);box-shadow:0 8px 18px rgba(16,185,129,.28)}
  .dl.alt{background:var(--soft);color:var(--ink);box-shadow:none;border:1px solid var(--line)}
  .tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
  .tag{background:rgba(85,102,255,.12);color:var(--brand);padding:4px 12px;border-radius:20px;font-size:13px}
  .errbox{background:rgba(244,71,107,.08);border:1px solid rgba(244,71,107,.4);color:#c0304f;padding:11px;border-radius:11px;margin-top:12px;white-space:pre-wrap;font-size:13px}
  .fn{margin-top:7px;font-size:13px;color:var(--ok)}
  .hint{font-size:12px;color:var(--mut);margin-top:7px}
  .est{font-size:12px;color:var(--mut);margin-top:3px}
  .sample-warmup{position:fixed;right:22px;bottom:22px;z-index:20;min-width:220px;
    background:rgba(255,255,255,.88);border:1px solid var(--glass);border-radius:12px;
    box-shadow:var(--sh-sm);padding:10px 13px;color:var(--ink);font-size:13px;
    backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur)}
  .sample-warmup .mini{height:4px;background:#e1e5f1;border-radius:4px;overflow:hidden;margin-top:7px}
  .sample-warmup .mini>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--flow))}
  .seclbl{margin-top:16px;font-size:13px;color:var(--ink);font-weight:700}
  .subprev{position:relative;height:260px;border-radius:14px;margin-top:8px;overflow:hidden;
    background:linear-gradient(135deg,#243049,#3a2c56 60%,#2b3a4a);display:flex;justify-content:center;
    align-items:flex-end;padding:20px;border:1px solid var(--glass)}
  .subprev::after{content:"画面示意";position:absolute;top:10px;left:14px;font-size:12px;color:rgba(255,255,255,.45)}
  #sub-prev-text{max-width:92%;text-align:center;line-height:1.35;word-break:break-word}
  .cover-editor{position:relative;aspect-ratio:16/9;max-width:520px;margin-top:8px;border-radius:12px;overflow:hidden;
    border:1px solid var(--line);background:#202431;box-shadow:var(--sh-sm)}
  .cover-editor img{width:100%;height:100%;object-fit:cover;display:block}
  .cover-title{position:absolute;left:7%;top:10%;width:62%;cursor:move;user-select:none;
    color:#ffeb00;font-weight:900;line-height:1.08;text-shadow:3px 3px 0 #050505,-3px 3px 0 #050505,3px -3px 0 #050505,-3px -3px 0 #050505;
    background:rgba(0,0,0,.34);border:1px dashed rgba(255,255,255,.55);border-radius:8px;padding:8px;word-break:break-word}
  .cover-resize{position:absolute;right:3px;bottom:3px;width:14px;height:14px;border-right:3px solid rgba(255,255,255,.85);
    border-bottom:3px solid rgba(255,255,255,.85);cursor:nwse-resize}
</style>
</head>
<body>
<div class="wrap">
  <h1>🎬 AI 视频自动化 · 流水线</h1>
  <p class="sub">六步生产线，每步可单独配置 / 运行 / 看进度与日志，也可「一键运行」按配置自动走完全程。</p>

  <div class="app">
    <aside class="queue-panel">
      <div class="qhead">
        <div>
          <div class="qtitle">视频队列</div>
          <div class="qsum" id="qsum">0 个任务</div>
        </div>
      </div>
      <label>添加链接（可一次粘贴多行）</label>
      <textarea id="queue-links" class="qinput" placeholder="https://...&#10;https://..."></textarea>
      <div class="qactions">
        <button class="btn" onclick="addQueueLinks()">添加</button>
        <button class="btn" id="runqueue" onclick="runQueue()">按顺序运行</button>
        <button class="btn ghost" id="stopqueue" onclick="stopQueue()">停止排队</button>
      </div>
      <div class="hint">点击队列项查看步骤详情；完成后可打开输出文件夹。</div>
      <div class="qlist" id="queue-list"></div>
    </aside>

    <main class="main">
      <div class="top">
        <button class="runall" id="runall" onclick="runAll()">一键运行当前任务</button>
        <button class="runall secondary" id="rerunall" onclick="rerunFrom('download')">重新生成全部</button>
        <div class="strip" id="strip"></div>
      </div>
      <div id="cards"></div>
    </main>
  </div>
</div>
<div id="sample-warmup" class="sample-warmup hide">
  <div id="sample-warmup-text">正在准备试听音色</div>
  <div class="mini"><i id="sample-warmup-bar"></i></div>
</div>

<script>
const API="";
let JOB=null,CFG=null,ST=null,QST=null,prev={},dlFile=null,coverFile=null,coverImgUrl="",srcMode="link",jobES=null,queueES=null;
const logOpen=new Set(), pvOpen=new Set();

const STEPS=[
  {key:"download",name:"下载 / 导入"},{key:"asr",name:"语音转文字"},{key:"translate",name:"翻译为中文"},
  {key:"tts",name:"中文配音"},{key:"compose",name:"合成视频"},{key:"publish",name:"保存信息归档"},
];
const BADGE={pending:"待运行",running:"进行中",done:"已完成",error:"出错"};

async function init(){
  CFG=await (await fetch(API+"/api/config")).json();
  JOB=(await (await fetch(API+"/api/jobs",{method:"POST"})).json()).job_id;
  buildStrip(); buildCards(); openSSE(); openQueueSSE(); startSampleWarmup();
}
function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function escAttr(s){return esc(s).replace(/"/g,"&quot;");}
function fmt(s){s=Math.max(0,s|0);const m=(s/60)|0,x=s%60;return `${String(m).padStart(2,"0")}:${String(x).padStart(2,"0")}`;}
function fmtDur(s){s=Math.max(0,Math.round(+s||0));const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),x=s%60;
  if(h)return `${h}时${String(m).padStart(2,"0")}分`;
  if(m)return `${m}分${String(x).padStart(2,"0")}秒`;
  return `${x}秒`;}
function fmtCost(c){if(!c)return "";
  const cny=+c.cny||0, usd=+c.usd||0, tok=+c.total_tokens||0;
  const money=cny>=0.01?`¥${cny.toFixed(2)}`:`¥${cny.toFixed(4)}`;
  return ` · Gemini费用 ${money} / $${usd.toFixed(4)} · ${tok} tokens`;}
function elem(h){const t=document.createElement("template");t.innerHTML=h.trim();return t.content.firstChild;}

// ---------- 顶部产线状态 ----------
function buildStrip(){
  const s=document.getElementById("strip");let h="";
  STEPS.forEach((st,i)=>{
    h+=`<div class="snode" id="sn-${st.key}" onclick="goCard('${st.key}')">
      <div class="sdot" id="sd-${st.key}">${i+1}</div><div class="sname">${st.name}</div></div>`;
    if(i<STEPS.length-1)h+=`<div class="sconn" id="sc-${i}"></div>`;
  });
  s.innerHTML=h;
}
function goCard(k){document.getElementById("card-"+k).scrollIntoView({behavior:"smooth",block:"center"});}

// ---------- 步骤卡 ----------
function buildCards(){
  const root=document.getElementById("cards");root.innerHTML="";
  STEPS.forEach((st,i)=>{
    const card=elem(`<div class="card" id="card-${st.key}">
      <div class="hbar"><i id="hb-${st.key}"></i></div>
      <div class="chead">
        <div class="ring" id="rg-${st.key}"><span class="ico" id="ic-${st.key}">${i+1}</span></div>
        <div class="ctit"><div class="cnm">${st.name}</div><div class="pill" id="pl-${st.key}">待运行</div><div class="est" id="est-${st.key}">预计 --</div></div></div>
      <div class="body">
        <div id="cfg-${st.key}"></div>
        <div class="step-actions">
          <button class="btn" id="rb-${st.key}" onclick="run('${st.key}')">${st.key==="publish"?"保存信息":"运行此步"}</button>
          <button class="btn ghost" id="rr-${st.key}" onclick="rerunFrom('${st.key}')">从此步重跑</button>
        </div>
        <div class="bar hide" id="bw-${st.key}"><i id="bp-${st.key}"></i></div>
        <div class="logtoggle" id="lt-${st.key}" onclick="toggleLog('${st.key}')">▸ 运行日志</div>
        <div class="log hide" id="lg-${st.key}"></div>
        <div class="errbox hide" id="eb-${st.key}"></div>
        <div class="logtoggle hide" id="ptg-${st.key}" onclick="togglePv('${st.key}')">▾ 输出结果</div>
        <div class="preview hide" id="pv-${st.key}"></div>
      </div></div>`);
    root.appendChild(card);
    document.getElementById("cfg-"+st.key).innerHTML=cfgHtml(st.key);
  });

function engineOptions(){return (CFG.tts_engines||[]).map(e=>{

function voiceOptions(engineKey, selectedVoice){
  const key=engineKey||curTtsEngineKey();

  if(!e)return "";
  const def=(e.key===CFG.tts_engine_default&&CFG.voice_default&&e.voices.includes(CFG.voice_default))?CFG.voice_default:e.default_voice;
  const picked=e.voices.includes(selectedVoice)?selectedVoice:def;
  const st=sampleStatus[key]||{};
  const ready=new Set(st.ready||[]);
  return e.voices.map(v=>{
    const state=ready.has(v)?"已缓存":(st.running?"正在生成":"未缓存");

function getSpeed(){const s=document.getElementById("tts-speed");return s?(+s.value).toFixed(2):"1.00";}
function speedOptions(){
  const opts=[0.75,0.85,0.9,0.95,1.0,1.05,1.1,1.15,1.2,1.25,1.3,1.4,1.5], cur=+(CFG.speed_default||1.0);
  let best=opts[0], diff=Infinity;
  opts.forEach(x=>{const d=Math.abs(x-cur);if(d<diff){best=x;diff=d;}});
  return opts.map(x=>`<option value="${x.toFixed(2)}" ${x===best?"selected":""}>${x.toFixed(2)}x</option>`).join("");
}
let warmupTimer=null;
function setWarmup(d){
  const box=document.getElementById("sample-warmup"),txt=document.getElementById("sample-warmup-text"),bar=document.getElementById("sample-warmup-bar");
  if(!box||!txt||!bar)return;
  if(!d||!d.running){box.classList.add("hide");return;}
  const total=Math.max(+d.total||0,1), done=Math.max(+d.done||0,0);
  txt.textContent=`正在准备试听音色 ${Math.min(done,total)}/${total}`;
  bar.style.width=`${Math.min(100,Math.round(done/total*100))}%`;
  box.classList.remove("hide");
}
async function pollSampleWarmup(){
  try{
    const r=await fetch(`${API}/api/voice-sample/prepare-status`);
    const d=await r.json();
    setWarmup(d);
    refreshCurrentEngineSampleStatus();
    if(d.running&&!warmupTimer)warmupTimer=setInterval(pollSampleWarmup,2000);
    if(!d.running&&warmupTimer){clearInterval(warmupTimer);warmupTimer=null;}
  }catch(_){setWarmup(null);}
}
async function refreshCurrentEngineSampleStatus(){
  const e=ttsEngine(curTtsEngineKey());
  if(!e||!e.available)return;
  try{
    const r=await fetch(`${API}/api/voice-sample/prepare-status?engine=${encodeURIComponent(e.key)}`);
    const d=await r.json();
    sampleStatus[e.key]=d;
    renderVoiceOptions(e.key);
    if((+d.done||0)<(+d.total||0)&&!d.running)ensureEngineSamples(e.key);
  }catch(_){}
}
async function ensureEngineSamples(engineKey){
  const now=Date.now();
  if(samplePrepareRequested[engineKey]&&now-samplePrepareRequested[engineKey]<5000)return;
  samplePrepareRequested[engineKey]=now;
  sampleStatus[engineKey]={...(sampleStatus[engineKey]||{}),running:true};
  renderVoiceOptions(engineKey);
  try{
    await fetch(`${API}/api/voice-sample/prepare`,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({engine:engineKey})});
    pollSampleWarmup();
  }catch(_){}
}
async function startSampleWarmup(){
  try{
    await fetch(`${API}/api/voice-sample/prepare`,{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
    pollSampleWarmup();
  }catch(_){setWarmup(null);}
}

function wireCoverEditor(){
  const file=document.getElementById("cover-file"),img=document.getElementById("cover-img"),box=document.getElementById("cover-title-box"),editor=document.getElementById("cover-editor"),handle=document.getElementById("cover-resize");
  if(!file||!img||!box||!editor)return;
  file.onchange=()=>{const f=file.files&&file.files[0];if(!f)return;coverFile=f;if(coverImgUrl)URL.revokeObjectURL(coverImgUrl);
    coverImgUrl=URL.createObjectURL(f);img.src=coverImgUrl;};
  let drag=null,resize=null;
  if(handle)handle.onpointerdown=ev=>{ev.stopPropagation();resize={x:ev.clientX,width:box.offsetWidth};handle.setPointerCapture(ev.pointerId);};
  box.onpointerdown=ev=>{drag={x:ev.clientX,y:ev.clientY,left:box.offsetLeft,top:box.offsetTop};box.setPointerCapture(ev.pointerId);};
  box.onpointermove=ev=>{
    if(resize){
      const width=Math.max(editor.clientWidth*.25,Math.min(editor.clientWidth*.9,resize.width+ev.clientX-resize.x));
      box.style.width=(width/editor.clientWidth*100).toFixed(1)+"%";
      const w=document.getElementById("cover-width"),wv=document.getElementById("cover-width-val");
      if(w)w.value=String(Math.round(width/editor.clientWidth*100));
      if(wv)wv.textContent=Math.round(width/editor.clientWidth*100)+"%";
      return;
    }
    if(!drag)return;
    const maxL=editor.clientWidth-box.offsetWidth,maxT=editor.clientHeight-box.offsetHeight;
    const left=Math.max(0,Math.min(maxL,drag.left+ev.clientX-drag.x));
    const top=Math.max(0,Math.min(maxT,drag.top+ev.clientY-drag.y));
    box.style.left=(left/editor.clientWidth*100).toFixed(2)+"%";
    box.style.top=(top/editor.clientHeight*100).toFixed(2)+"%";
  };
  box.onpointerup=box.onpointercancel=()=>{drag=null;resize=null;};
  if(handle)handle.onpointerup=handle.onpointercancel=()=>{resize=null;};
  updateCoverPreviewStyle();updateCoverPreviewText();
}
function updateCoverPreviewText(){
  const text=document.getElementById("cover-title-text"),input=document.getElementById("cover-title-input");

function updateCoverPreviewStyle(){

function collect(step,forceTts){const g=id=>document.getElementById(id);
  if(step==="download")return {url:(g("dl-url")||{}).value?.trim()||"",media:(document.querySelector('input[name=media]:checked')||{}).value||"video"};
  if(step==="asr")return {model:g("asr-model").value,language:g("asr-lang").value};
  if(step==="translate")return {engine:g("tr-engine").value};
  if(step==="tts")return {engine:(g("tts-engine")||{}).value||CFG.tts_engine_default,voice:g("tts-voice").value,speed:g("tts-speed").value,force:!!forceTts};
  if(step==="compose")return {mode:(document.querySelector('input[name=cmode]:checked')||{}).value||"original",
    bg:g("cm-bg")?.value,bg2:g("cm-bg2")?.value,preset:g("cm-preset").value,
    fontsize:+(g("cm-fontsize")?.value||0),position:g("cm-position")?.value||"",
    bilingual:g("cm-bi").checked,burn:g("cm-burn").checked};
  if(step==="publish"){
    const box=g("cover-title-box"),ed=g("cover-editor");
    const x=box&&ed?(box.offsetLeft/Math.max(ed.clientWidth,1)):0.07;
    const y=box&&ed?(box.offsetTop/Math.max(ed.clientHeight,1)):0.10;
    return {platform:g("pb-platform").value,mode:"archive",
      cover_title:(g("cover-title-input")||{}).value||"",
      cover_x:x,cover_y:y,
      cover_font_size:+((g("cover-font")||{}).value||132),
      cover_width:+((g("cover-width")||{}).value||62)/100};}
  return {};}
function collectAll(){
  const cfgs={};STEPS.forEach(s=>cfgs[s.key]=collect(s.key,s.key==="tts"));
  const qi=currentQueueItem();
  if(qi&&!cfgs.download.url)cfgs.download.url=qi.url;
  return cfgs;
}

function selectJob(jobId){
  if(!jobId)return;
  const changed=jobId!==JOB;
  if(!changed){syncSelectedQueueUrl();renderQueue();loadStateOnce(jobId);return;}
  const reopen=[...pvOpen];               // 记住切换前展开的预览
  JOB=jobId;
  ST=null; prev={}; pvOpen.clear(); logOpen.clear();
  resetPreviews();                        // 清掉上一队列项残留的缓存内容
  openSSE();
  syncSelectedQueueUrl();
  renderQueue();
  loadStateOnce(jobId).then(()=>{         // 状态就绪后，按新队列项重新加载缓存
    if(JOB!==jobId||!ST)return;
    reopen.forEach(k=>{if(ST.steps[k]&&ST.steps[k].status==="done")loadPreview(k,true);});
  });

async function run(step){
  const fd=new FormData();fd.append("step",step);const cfg=collect(step,true);
  if(step==="download"){
    const qi=currentQueueItem();
    if(qi&&!cfg.url)cfg.url=qi.url;
    if(srcMode==="file"){if(!dlFile){alert("请选择文件");return;}fd.append("file",dlFile);}
    else if(!cfg.url){alert("请填写链接");return;}}
  if(step==="publish"&&coverFile)fd.append("file",coverFile);
  fd.append("config_json",JSON.stringify(cfg));
  logOpen.add(step);syncLog(step);
  const r=await fetch(`${API}/api/jobs/${JOB}/run`,{method:"POST",body:fd});
  if(!r.ok)alert((await r.json().catch(()=>({}))).detail||"提交失败");
}

async function runAll(){
  const cfgs=collectAll();
  const qi=currentQueueItem();
  if(qi&&!cfgs.download.url)cfgs.download.url=qi.url;
  if(srcMode!=="file"&&!cfgs.download.url){alert("请先在第1步填写链接或上传文件");return;}
  const fd=new FormData();fd.append("configs_json",JSON.stringify(cfgs));
  if(srcMode==="file"&&dlFile)fd.append("file",dlFile);
  if(coverFile)fd.append("cover_file",coverFile);
  logOpen.add("download");syncLog("download");
  const r=await fetch(`${API}/api/jobs/${JOB}/run_all`,{method:"POST",body:fd});
  if(!r.ok)alert((await r.json().catch(()=>({}))).detail||"提交失败");
}

async function rerunFrom(step){
  if(!JOB)return;
  const cfgs=collectAll();
  if(step==="download"&&srcMode==="file"){alert("重新生成全部暂时只支持队列链接；本地文件请重新上传后用一键运行。");return;}
  if(step==="download"&&!cfgs.download.url){alert("从第1步重跑需要视频链接");return;}
  logOpen.add(step);syncLog(step);
  const r=await fetch(`${API}/api/jobs/${JOB}/rerun_from`,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({step,configs:cfgs})
  });
  if(!r.ok)alert((await r.json().catch(()=>({}))).detail||"重新生成失败");
}

// ---------- SSE ----------
function openSSE(){
  if(jobES)jobES.close();
  jobES=new EventSource(`${API}/api/jobs/${JOB}/stream`);
  jobES.onmessage=ev=>{ST=JSON.parse(ev.data);apply();};
}

function openQueueSSE(){
  if(queueES)queueES.close();
  queueES=new EventSource(`${API}/api/queue/stream`);
  queueES.onmessage=ev=>{QST=JSON.parse(ev.data);renderQueue();};
}

const QSTATUS={pending:"待执行",running:"执行中",done:"已完成",error:"出错"};
function itemProgress(item){
  const steps=STEPS.map(s=>s.key);
  const done=steps.filter(k=>{
    if(item.job_id===JOB&&ST)return ST.steps[k].status==="done";
    return false;
  }).length;
  if(item.status==="done")return 100;
  if(item.status==="pending")return 0;
  if(item.status==="error")return Math.max(8,done/STEPS.length*100);
  const cur=steps.indexOf(item.current_step);
  const stepProg=(item.job_id===JOB&&ST&&item.current_step)?(ST.steps[item.current_step].progress||0):0;
  return Math.max(4,((Math.max(cur,0)+stepProg/100)/steps.length)*100);
}

function renderQueue(){
  const list=document.getElementById("queue-list"),sum=document.getElementById("qsum");
  if(!QST||!list)return;
  const items=QST.items||[];
  const pending=items.filter(x=>x.status==="pending").length;
  const done=items.filter(x=>x.status==="done").length;
  const running=items.find(x=>x.status==="running");
  sum.textContent=`${items.length} 个任务 · ${done} 完成 · ${pending} 待执行`;
  document.getElementById("runqueue").disabled=!!QST.running||!items.length;
  document.getElementById("stopqueue").disabled=!QST.running;
  if(items.length&&!items.some(x=>x.job_id===JOB))selectJob(items[0].job_id);
  if(running&&running.job_id!==JOB)selectJob(running.job_id);
  syncSelectedQueueUrl();
  if(!items.length){list.innerHTML='<div class="hint">还没有队列任务。</div>';return;}
  list.innerHTML=items.map((it,i)=>{
    const name=esc(it.title||it.url);
    const dur=it.estimate&&it.estimate.duration_sec?fmtDur(it.estimate.duration_sec):"--";
    const rem=it.status==="done"?"0秒":fmtDur((it.estimate||{}).remaining_sec||0);
    const total=fmtDur((it.estimate||{}).total_sec||0);
    const current=it.current_step?`当前：${esc((STEPS.find(s=>s.key===it.current_step)||{}).name||it.current_step)}`:(it.error?esc(it.error):"");
    const pct=itemProgress(it);
    return `<div class="qitem ${it.status} ${it.job_id===JOB?"active":""}" onclick="selectJob('${it.job_id}')">
      <div class="qtop"><div class="qidx">${i+1}</div><div class="qname">${name}</div><div class="qstatus">${QSTATUS[it.status]||it.status}</div></div>
      <div class="qmeta"><div>时长 ${dur}</div><div>预计 ${total}</div><div>已用 ${fmtDur(it.elapsed_sec||0)}</div><div>剩余 ${rem}</div></div>
      ${current?`<div class="hint">${current}</div>`:""}
      <div class="qbar"><i style="width:${pct}%"></i></div>
      <div class="qtools">
        <button class="qtool" onclick="moveQueueItem('${it.id}',-1,event)" ${i===0||QST.running?"disabled":""}>上移</button>
        <button class="qtool" onclick="moveQueueItem('${it.id}',1,event)" ${i===items.length-1||QST.running?"disabled":""}>下移</button>
        <button class="qtool" onclick="deleteQueueItem('${it.id}',event)" ${it.status==="running"?"disabled":""}>删除</button>
        <button class="qtool" onclick="openOutput('${it.id}',event)" ${it.status!=="done"?"disabled":""}>打开输出</button>
      </div>
    </div>`;
  }).join("");
}

function apply(){
  if(!ST)return;
  document.getElementById("runall").disabled=ST.running;
  document.getElementById("rerunall").disabled=ST.running;
  STEPS.forEach((step,i)=>{
    const k=step.key,info=ST.steps[k];
    const card=document.getElementById("card-"+k);
    card.classList.remove("done","running","error","ready");
    if(info.status!=="pending")card.classList.add(info.status);
    const prevDone=i===0||ST.steps[STEPS[i-1].key].status==="done";
    if(info.status==="pending"&&prevDone)card.classList.add("ready");
    document.getElementById("pl-"+k).textContent=BADGE[info.status];
    const est=document.getElementById("est-"+k);
    if(est){
      const elapsed=info.elapsed_sec?` · 已用 ${fmtDur(info.elapsed_sec)}`:"";
      const cost=k==="tts"?fmtCost((info.result||{}).gemini_cost):"";
      est.textContent=`预计 ${fmtDur(info.estimate_sec||0)}${elapsed}${cost}`;
    }
    const rb=document.getElementById("rb-"+k);
    if(rb)rb.disabled=!!ST.running||!prevDone;
    const rr=document.getElementById("rr-"+k);
    if(rr)rr.disabled=!!ST.running||!prevDone;
    const running=(k===ST.current&&ST.running);
    // 进度环 + 头条
    const pc = running?info.progress : (info.status==="done"?100:info.progress);
    document.getElementById("rg-"+k).style.setProperty("--p",pc);
    document.getElementById("hb-"+k).style.width=(info.status==="done"?100:pc)+"%";
    document.getElementById("ic-"+k).innerHTML=info.status==="done"?'<span class="chk">✓</span>':running?'<span class="spin"></span>':(i+1);
    // 进度条 + 日志
    const bw=document.getElementById("bw-"+k);bw.classList.toggle("hide",!(running||info.progress>0&&info.status!=="done"));
    document.getElementById("bp-"+k).style.width=info.progress+"%";
    if(running&&!logOpen.has(k)){logOpen.add(k);syncLog(k);}
    if(logOpen.has(k)){const lg=document.getElementById("lg-"+k);
      lg.innerHTML=info.logs.length?info.logs.map(l=>`<div><span class="s">[${l.stage}]</span> ${esc(l.msg)}</div>`).join(""):`<div><span class="s">[state]</span> 暂无日志，步骤尚未开始。</div>`;
      lg.scrollTop=lg.scrollHeight;}
    // 错误
    const eb=document.getElementById("eb-"+k);
    if(info.status==="error"){eb.textContent="❌ "+(info.error||"出错");eb.classList.remove("hide");}else eb.classList.add("hide");
    // 顶部产线
    const sn=document.getElementById("sn-"+k);sn.classList.remove("done","running","error");
    if(info.status!=="pending")sn.classList.add(info.status);
    document.getElementById("sd-"+k).innerHTML=info.status==="done"?"✓":(i+1);
    if(i<STEPS.length-1){const sc=document.getElementById("sc-"+i);sc.classList.remove("flow","done");
      const nb=ST.steps[STEPS[i+1].key].status;
      if(info.status==="done"&&nb==="done")sc.classList.add("done");
      else if(info.status==="done"&&(nb==="running"||nb==="pending"))sc.classList.add("flow");}
    if(info.status==="done")document.getElementById("ptg-"+k).classList.remove("hide");
    prev[k]=info.status;
  });
}

// ---------- 预览 ----------
async function loadPreview(key, open=false){
  const pv=document.getElementById("pv-"+key);if(!pv)return;
  document.getElementById("ptg-"+key).classList.remove("hide");
  if(open){pvOpen.add(key);syncPv(key);}
  if(key==="download")
    pv.innerHTML=`<div class="ptitle">下载完成</div>`+(ST.has_video?`<video controls src="${API}/api/jobs/${JOB}/source.mp4"></video>`:`<div class="hint">仅音频模式，无视频画面。</div>`);
  else if(key==="asr"){const d=await (await fetch(`${API}/api/jobs/${JOB}/transcript`)).json();
    pv.innerHTML=`<div class="ptitle">识别结果（${d.segments.length} 段）</div><div class="list">${d.segments.map(s=>`<div class="cue"><span class="tc">${fmt(s.start)}</span><span>${esc(s.text)}</span></div>`).join("")}</div>`;}
  else if(key==="translate"){const d=await (await fetch(`${API}/api/jobs/${JOB}/translation`)).json();
    pv.innerHTML=`<div class="ptitle">翻译结果（${d.segments.length} 段）</div><div class="list">${d.segments.map(s=>`<div class="cue"><span class="tc">${fmt(s.start)}</span><span><div>${esc(s.zh)}</div><div class="en">${esc(s.text)}</div></span></div>`).join("")}</div>`;}
  else if(key==="tts")
    pv.innerHTML=`<div class="ptitle">配音音轨试听</div><audio controls src="${API}/api/jobs/${JOB}/dub.wav?t=${Date.now()}"></audio>`;
  else if(key==="compose")
    pv.innerHTML=`<div class="ptitle">成片预览</div><video controls src="${API}/api/jobs/${JOB}/video.mp4?t=${Date.now()}"></video>
      <div><a class="dl" href="${API}/api/jobs/${JOB}/video.mp4?download=true">⬇ 下载 MP4</a>
      <a class="dl alt" href="${API}/api/jobs/${JOB}/sub?fmt=srt">⬇ 下载字幕</a></div>`;
  else if(key==="publish"){const m=await (await fetch(`${API}/api/jobs/${JOB}/metadata`)).json();
    pv.innerHTML=`<div class="ptitle">保存信息（已保存到 output）</div>
      <label>标题</label><input type="text" value="${(m.title||"").replace(/"/g,"&quot;")}">
      <label>简介</label><textarea>${esc(m.desc)}</textarea>
      <label>标签</label><div class="tags">${(m.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>
      <label>建议分区</label><input type="text" value="${esc(m.partition)} / TID ${esc(String(m.tid||""))}" style="max-width:420px">
      ${m.cover?`<label>封面</label><img class="cover" src="${API}/api/jobs/${JOB}/cover.png?t=${Date.now()}">`:""}
      ${m.archive_dir?`<label>归档目录</label><input type="text" value="${esc(m.archive_dir).replace(/"/g,"&quot;")}">`:""}
      <div><a class="dl" href="${API}/api/jobs/${JOB}/video.mp4?download=true">⬇ 下载成片</a></div>`;}
}

async function sample(ev){const v=document.getElementById("tts-voice").value;
  if(currentSampleAudio){currentSampleAudio.pause();currentSampleAudio.currentTime=0;currentSampleAudio=null;}
  if(currentSampleUrl){URL.revokeObjectURL(currentSampleUrl);currentSampleUrl="";}
  const fd=new FormData();fd.append("voice",v);fd.append("engine",curTtsEngineKey());
  const btn=ev.target;btn.disabled=true;btn.textContent="合成中…";
  try{const r=await fetch(`${API}/api/voice-sample`,{method:"POST",body:fd});if(!r.ok)throw 0;
    currentSampleUrl=URL.createObjectURL(await r.blob());
    const audio=new Audio(currentSampleUrl);
    const rate=Math.max(0.5,Math.min(2.0,+getSpeed()||1));
    audio.playbackRate=rate;
    audio.preservesPitch=true;
    audio.mozPreservesPitch=true;
    audio.webkitPreservesPitch=true;
    currentSampleAudio=audio;
    audio.onended=()=>{if(currentSampleAudio===audio)currentSampleAudio=null;};
    audio.play();
    refreshCurrentEngineSampleStatus();}catch(e){alert("试听失败");}
  btn.disabled=false;btn.textContent="🔊 试听";}

init();
