<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 视频自动化 · 中文配音 + 字幕</title>
<style>
  :root{
    --bg:#0f1117; --card:#191c24; --card2:#21252f; --line:#2c313c;
    --fg:#e8eaed; --mut:#8b93a3; --acc:#5b8cff; --acc2:#3a6bff;
    --ok:#37d399; --run:#ffb454; --err:#ff5d6c;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);
    font:15px/1.6 "Microsoft YaHei",system-ui,Segoe UI,sans-serif;}
  .wrap{max-width:880px;margin:0 auto;padding:32px 20px 60px}
  h1{font-size:24px;margin:0 0 4px}
  .sub{color:var(--mut);margin:0 0 26px;font-size:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:22px;margin-bottom:20px}
  .tabs{display:flex;gap:8px;margin-bottom:16px}
  .tab{flex:1;text-align:center;padding:10px;border:1px solid var(--line);
    border-radius:10px;cursor:pointer;color:var(--mut);background:var(--card2)}
  .tab.on{color:#fff;border-color:var(--acc);background:rgba(91,140,255,.12)}
  label{display:block;font-size:13px;color:var(--mut);margin:14px 0 6px}
  input[type=text],select,input[type=file]{width:100%;padding:11px 12px;
    background:var(--card2);border:1px solid var(--line);border-radius:10px;
    color:var(--fg);font-size:14px;outline:none}
  input[type=text]:focus,select:focus{border-color:var(--acc)}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .row>div{flex:1;min-width:160px}
  .drop{border:1.5px dashed var(--line);border-radius:12px;padding:26px;
    text-align:center;color:var(--mut);cursor:pointer;background:var(--card2)}
  .drop.hover{border-color:var(--acc);color:var(--fg)}
  .btn{margin-top:20px;width:100%;padding:13px;border:0;border-radius:11px;
    background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;
    font-size:16px;font-weight:600;cursor:pointer}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .hide{display:none!important}
  /* 进度 */
  .bar{height:8px;background:var(--card2);border-radius:6px;overflow:hidden;margin:6px 0 18px}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--acc),var(--ok));
    transition:width .4s}
  .steps{display:flex;flex-direction:column;gap:2px}
  .step{display:flex;align-items:center;gap:12px;padding:10px 6px;border-radius:8px}
  .dot{width:22px;height:22px;border-radius:50%;flex:none;display:grid;place-items:center;
    font-size:12px;background:var(--card2);border:1px solid var(--line);color:var(--mut)}
  .step.running .dot{background:var(--run);color:#1a1a1a;border-color:var(--run)}
  .step.done .dot{background:var(--ok);color:#06281c;border-color:var(--ok)}
  .step.running{background:rgba(255,180,84,.08)}
  .step .nm{font-size:14px}
  .step.pending .nm{color:var(--mut)}
  .spin{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .log{margin-top:16px;background:#0c0e13;border:1px solid var(--line);border-radius:10px;
    padding:12px;height:170px;overflow:auto;font:12px/1.6 Consolas,monospace;color:#b8c0cf}
  .log .s{color:var(--acc)}
  video{width:100%;border-radius:12px;margin-top:6px;background:#000}
  .dl{display:inline-block;margin-top:14px;padding:11px 20px;border-radius:10px;
    background:var(--ok);color:#06281c;font-weight:700;text-decoration:none}
  .errbox{background:rgba(255,93,108,.1);border:1px solid var(--err);color:#ffb3ba;
    padding:12px;border-radius:10px;margin-top:14px;white-space:pre-wrap;font-size:13px}
  .fn{margin-top:8px;font-size:13px;color:var(--ok)}
</style>
</head>
<body>
<div class="wrap">
  <h1>🎬 AI 视频自动化</h1>
  <p class="sub">YouTube 链接或本地视频 → 中文配音 + 中文硬字幕 MP4，全程在你本机的 GPU 上完成。</p>

  <!-- 输入 -->
  <div class="card" id="inputCard">
    <div class="tabs">
      <div class="tab on" data-tab="link">🔗 填链接</div>
      <div class="tab" data-tab="file">📁 上传视频</div>
    </div>

    <div id="paneLink">
      <label>YouTube 视频链接</label>
      <input type="text" id="url" placeholder="https://www.youtube.com/watch?v=...">
    </div>

    <div id="paneFile" class="hide">
      <label>本地视频文件（mp4 / mkv / mov …）</label>
      <div class="drop" id="drop">点击或拖拽视频到此处<div class="fn" id="fname"></div></div>
      <input type="file" id="file" accept="video/*" class="hide">
    </div>

    <div class="row">
      <div>
        <label>配音音色</label>
        <select id="voice"></select>
      </div>
      <div>
        <label>识别精度</label>
        <select id="whisper">
          <option value="small">标准（small，快）</option>
          <option value="large-v3-turbo">高精度（large-v3-turbo）</option>
        </select>
      </div>
      <div>
        <label>源语言</label>
        <select id="language">
          <option value="">自动检测</option>
          <option value="en">英语</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
          <option value="fr">法语</option>
          <option value="de">德语</option>
          <option value="es">西班牙语</option>
          <option value="ru">俄语</option>
        </select>
      </div>
    </div>

    <button class="btn" id="go">开始生成</button>
  </div>

  <!-- 进度 -->
  <div class="card hide" id="progCard">
    <div class="bar"><i id="barFill"></i></div>
    <div class="steps" id="steps"></div>
    <div class="log" id="log"></div>
  </div>

  <!-- 结果 -->
  <div class="card hide" id="resultCard">
    <video id="video" controls></video>
    <a class="dl" id="download" href="#">⬇ 下载 MP4</a>
  </div>

  <div class="errbox hide" id="errbox"></div>
</div>

<script>
const STEPS = [
  ["download","下载 / 导入"],["asr","语音识别"],["translate","翻译"],
  ["tts","中文配音"],["subs","生成字幕"],["mux","合成输出"]
];
let mode = "link", chosenFile = null;

// 标签切换
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); mode=t.dataset.tab;
  paneLink.classList.toggle("hide", mode!=="link");
  paneFile.classList.toggle("hide", mode!=="file");
});

// 文件选择
const drop=document.getElementById("drop"), fileEl=document.getElementById("file");
drop.onclick=()=>fileEl.click();
fileEl.onchange=()=>{ if(fileEl.files[0]){chosenFile=fileEl.files[0];fname.textContent=chosenFile.name;} };
["dragover","dragenter"].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add("hover");}));
["dragleave","drop"].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove("hover");}));
drop.addEventListener("drop",ev=>{ if(ev.dataTransfer.files[0]){chosenFile=ev.dataTransfer.files[0];fname.textContent=chosenFile.name;} });

// 载入音色
fetch("/api/voices").then(r=>r.json()).then(d=>{
  voice.innerHTML = d.voices.map(v=>`<option ${v===d.default?"selected":""}>${v}</option>`).join("");
});

function renderSteps(steps,current){
  document.getElementById("steps").innerHTML = STEPS.map(([k,name])=>{
    const st = steps[k]||"pending";
    const icon = st==="done" ? "✓" : st==="running" ? '<span class="spin">◠</span>' : "";
    return `<div class="step ${st}"><div class="dot">${icon}</div><div class="nm">${name}</div></div>`;
  }).join("");
}
function renderLog(logs){
  const el=document.getElementById("log");
  el.innerHTML = logs.map(l=>`<div><span class="s">[${l.stage}]</span> ${escapeHtml(l.msg)}</div>`).join("");
  el.scrollTop = el.scrollHeight;
}
function escapeHtml(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

document.getElementById("go").onclick = async ()=>{
  const fd = new FormData();
  if(mode==="link"){
    if(!url.value.trim()){alert("请填写链接");return;}
    fd.append("url", url.value.trim());
  }else{
    if(!chosenFile){alert("请选择视频文件");return;}
    fd.append("file", chosenFile);
  }
  fd.append("voice", voice.value);
  fd.append("whisper", whisper.value);
  fd.append("language", language.value);

  go.disabled=true; go.textContent="任务进行中…";
  errbox.classList.add("hide");
  resultCard.classList.add("hide");
  progCard.classList.remove("hide");
  renderSteps({}, null); barFill.style.width="0%";

  let job;
  try{
    const r = await fetch("/api/jobs",{method:"POST",body:fd});
    if(!r.ok){throw new Error((await r.json()).detail||"提交失败");}
    job = (await r.json()).job_id;
  }catch(e){ showError(e.message); resetBtn(); return; }

  const es = new EventSource(`/api/jobs/${job}/stream`);
  es.onmessage = ev=>{
    const j = JSON.parse(ev.data);
    renderSteps(j.steps, j.current);
    barFill.style.width = (j.percent||0)+"%";
    renderLog(j.logs||[]);
    if(j.status==="done"){
      es.close();
      video.src = j.result + "?t=" + Date.now();
      download.href = j.result + "?download=true";
      resultCard.classList.remove("hide");
      resetBtn();
    }else if(j.status==="error"){
      es.close(); showError(j.error||"任务失败"); resetBtn();
    }
  };
  es.onerror = ()=>{ es.close(); };
};

function showError(m){ errbox.textContent="❌ "+m; errbox.classList.remove("hide"); }
function resetBtn(){ go.disabled=false; go.textContent="开始生成"; }
</script>
</body>
</html>
