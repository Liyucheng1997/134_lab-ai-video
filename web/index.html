<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>星星点灯</title>
<style>
  :root{
    --bg1:#edf3fb;--bg2:#f7f4ee;
    --card:rgba(255,255,255,.55);--soft:rgba(255,255,255,.5);
    --glass:rgba(255,255,255,.72);
    --ink:#222a39;--mut:#6f7892;--line:rgba(140,150,195,.22);
    --brand:#3f579f;--brand2:#2f7f86;--flow:#4e8f9a;--star:#c3953d;
    --ok:#10b981;--run:#d9a441;--err:#f4476b;
    --sh:0 16px 44px rgba(60,72,140,.18);--sh-sm:0 8px 26px rgba(60,72,140,.12);
    --blur:saturate(170%) blur(22px);
  }
  *{box-sizing:border-box}
  body{margin:0;color:var(--ink);font:15px/1.65 "Microsoft YaHei",system-ui,"Segoe UI",sans-serif;
    background:
      radial-gradient(900px 460px at 8% -6%,rgba(70,91,199,.24),transparent 60%),
      radial-gradient(820px 460px at 102% 4%,rgba(217,164,65,.13),transparent 55%),
      radial-gradient(700px 520px at 50% 108%,rgba(38,155,154,.18),transparent 60%),
      linear-gradient(135deg,var(--bg1),var(--bg2));background-attachment:fixed;min-height:100vh}
  .wrap{max-width:1680px;margin:0 auto;padding:30px 26px 90px}
  .head{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:20px}
  .head-main{min-width:0}
  h1{font-size:27px;margin:0 0 4px;font-weight:800;letter-spacing:.5px;color:var(--brand)}
  .brand-title{display:flex;align-items:center;gap:10px}
  .brand-mark{width:32px;height:32px;border-radius:11px;display:grid;place-items:center;position:relative;flex:none;overflow:hidden;
    background:
      radial-gradient(circle at 75% 24%,rgba(255,255,255,.60) 0 1.4px,transparent 1.9px),
      radial-gradient(circle at 24% 76%,rgba(255,255,255,.38) 0 1.1px,transparent 1.6px),
      #263b86;
    box-shadow:0 9px 22px rgba(38,61,140,.24),inset 0 1px 0 rgba(255,255,255,.28)}
  .brand-mark::before{content:"";width:15px;height:15px;background:#fff5c8;
    clip-path:polygon(50% 0,58% 39%,100% 50%,58% 61%,50% 100%,42% 61%,0 50%,42% 39%);
    filter:drop-shadow(0 0 8px rgba(241,212,138,.70))}
  .brand-mark::after{content:"";position:absolute;left:5px;top:18px;width:21px;height:9px;border-top:1.4px solid rgba(241,212,138,.55);
    border-radius:50%;transform:rotate(-22deg)}
  .sub{color:var(--mut);margin:0;font-size:14px}
  .brand-slogan{margin-top:6px;color:#46506a;font-size:15px;font-weight:700}
  .brand-desc{margin-top:2px;color:var(--mut);font-size:13px}
  .gpu{min-width:310px;max-width:430px;background:rgba(255,255,255,.68);border:1px solid var(--glass);border-radius:14px;
    box-shadow:var(--sh-sm);padding:9px 12px;backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur)}
  .gpu-top{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12px;color:var(--mut)}
  .gpu-name{font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .gpu-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;margin-top:5px;font-size:12px;color:var(--mut)}
  .gpu-grid b{color:var(--ink);font-weight:800}
  .gpu-bar{height:5px;background:#e1e5f1;border-radius:5px;overflow:hidden;margin-top:7px}
  .gpu-bar>i{display:block;height:100%;width:0;background:var(--brand);transition:width .3s}
  @media(max-width:760px){.head{display:block}.gpu{margin-top:12px;min-width:0;max-width:none}}
  .app{display:grid;grid-template-columns:340px minmax(0,1fr);gap:20px;align-items:start}
  @media(max-width:980px){.app{grid-template-columns:1fr}
    .side{position:static!important;height:auto!important;max-height:none!important;overflow:visible!important}
    .queue-panel,.archive-launcher{flex:none!important}
    .qlist{overflow-y:auto!important}}
  .side{position:sticky;top:22px;height:calc(100vh - 44px);overflow:hidden;display:flex;flex-direction:column;gap:16px}
  .queue-panel,.archive-launcher{background:var(--card);
    border:1px solid var(--glass);border-radius:18px;box-shadow:var(--sh-sm);padding:16px;backdrop-filter:var(--blur);
    -webkit-backdrop-filter:var(--blur);display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .queue-panel{flex:1 1 0;display:flex;flex-direction:column;min-height:0}
  .archive-launcher{flex:0 0 auto;padding:12px}
  .qhead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
  .qtitle{font-size:17px;font-weight:800}
  .qsum{font-size:12px;color:var(--mut)}
  .qinput{min-height:96px}
  .qactions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .qactions .btn{margin-top:0;padding:9px 12px;font-size:13px;border-radius:10px}
  .qactions .btn.ghost{padding:8px 11px}
  .qlist{display:flex;flex-direction:column;gap:10px;margin-top:14px;flex:1 1 auto;height:auto;
    min-height:260px;overflow-y:auto;overscroll-behavior:contain;padding-right:7px;scrollbar-width:thin;scrollbar-color:rgba(63,87,159,.45) rgba(225,229,241,.55)}
  .qlist::-webkit-scrollbar{width:8px}
  .qlist::-webkit-scrollbar-track{background:rgba(225,229,241,.55);border-radius:999px}
  .qlist::-webkit-scrollbar-thumb{background:rgba(63,87,159,.45);border-radius:999px;border:2px solid rgba(248,250,255,.80)}
  .qlist::-webkit-scrollbar-thumb:hover{background:rgba(63,87,159,.62)}
  .qitem{position:relative;flex:0 0 auto;border:1px solid var(--line);background:var(--soft);border-radius:12px;padding:10px;cursor:pointer;overflow:hidden}
  .qitem.active{border-color:#3146b7;background:rgba(63,87,159,.10);
    box-shadow:0 10px 26px rgba(49,70,183,.20),inset 0 0 0 1px rgba(49,70,183,.18)}
  .qitem.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--brand)}
  .qitem.running{border-color:rgba(217,164,65,.52)}
  .qitem.done{border-color:rgba(16,185,129,.5)}
  .qitem.error{border-color:rgba(244,71,107,.6)}
  .qitem.active,.qitem.done.active,.qitem.running.active,.qitem.error.active{border-color:#3146b7;background:rgba(63,87,159,.10);
    box-shadow:0 10px 26px rgba(49,70,183,.20),inset 0 0 0 1px rgba(49,70,183,.18)}
  .qtop{display:flex;align-items:center;gap:8px}
  .qidx{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;flex:none;background:#fff;border:1px solid var(--line);
    color:var(--mut);font-size:12px;font-weight:800}
  .qitem.active .qidx{border-color:#3146b7;color:#3146b7;background:#fff;font-weight:900}
  .qname{min-width:0;flex:1;font-size:13px;font-weight:700;line-height:1.35;word-break:break-word}
  .qstatus{font-size:11px;border-radius:20px;padding:2px 8px;background:#fff;color:var(--mut);white-space:nowrap}
  .qitem.running .qstatus{background:rgba(217,164,65,.14);color:#9a6a10}
  .qitem.done .qstatus{background:rgba(16,185,129,.14);color:var(--ok)}
  .qitem.error .qstatus{background:rgba(244,71,107,.12);color:var(--err)}
  .qmeta{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px;margin-top:8px;font-size:12px;color:var(--mut)}
  .qbar{height:5px;background:#e1e5f1;border-radius:5px;overflow:hidden;margin-top:8px}
  .qbar>i{display:block;height:100%;width:0;background:var(--brand)}
  .qtools{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .qtool{border:1px solid var(--line);background:#fff;border-radius:8px;padding:4px 7px;font-size:12px;cursor:pointer;color:var(--ink)}
  .qtool:disabled{opacity:.45;cursor:not-allowed}
  .qtool.uploaded{border-color:rgba(16,185,129,.35);background:rgba(16,185,129,.10);color:var(--ok);font-weight:700}
  .qurl{margin-top:3px;color:var(--mut);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .archive-btn{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.62);border-radius:14px;padding:12px;
    display:flex;align-items:center;gap:12px;cursor:pointer;color:var(--ink);font:inherit;text-align:left;transition:.2s}
  .archive-btn:hover{background:#fff;border-color:rgba(38,155,154,.30);transform:translateY(-1px)}
  .archive-ico{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;flex:none;
    background:rgba(63,87,159,.10);font-size:18px}
  .archive-btn-main{min-width:0;flex:1}
  .archive-title{display:block;font-size:14px;font-weight:800;line-height:1.3}
  .archive-count{display:block;font-size:12px;color:var(--mut);margin-top:1px}
  .archive-arrow{color:var(--mut);font-size:20px}
  body.modal-open{overflow:hidden}
  .archive-overlay{position:fixed;inset:0;z-index:80;pointer-events:none;opacity:0;transition:opacity .22s ease}
  .archive-overlay.open{pointer-events:auto;opacity:1}
  .archive-scrim{position:absolute;inset:0;background:rgba(31,38,62,.28);backdrop-filter:saturate(150%) blur(18px);
    -webkit-backdrop-filter:saturate(150%) blur(18px)}
  .archive-library{position:absolute;inset:28px;display:flex;flex-direction:column;overflow:hidden;border-radius:28px;
    background:rgba(248,250,255,.82);border:1px solid rgba(255,255,255,.78);box-shadow:0 30px 90px rgba(37,48,93,.32);
    backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);transform:translateY(24px) scale(.96);
    opacity:.2;transition:transform .26s cubic-bezier(.2,.8,.2,1),opacity .22s ease}
  .archive-overlay.open .archive-library{transform:translateY(0) scale(1);opacity:1}
  .archive-library-head{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:22px 24px 16px;border-bottom:1px solid var(--line)}
  .archive-library-kicker{font-size:12px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
  .archive-library-title{font-size:26px;font-weight:900;line-height:1.15;margin-top:2px}
  .archive-library-count{font-size:13px;color:var(--mut);margin-top:3px}
  .archive-library-tools{display:flex;align-items:center;gap:12px;flex:none}
  .archive-sort{display:flex;align-items:center;gap:4px;border:1px solid var(--line);background:rgba(255,255,255,.54);
    border-radius:12px;padding:4px;box-shadow:0 8px 22px rgba(60,72,140,.08)}
  .archive-sort-btn{border:0;background:transparent;border-radius:8px;padding:6px 10px;color:var(--mut);font:inherit;
    font-size:12px;font-weight:800;line-height:1.2;cursor:pointer;white-space:nowrap}
  .archive-sort-btn.active{background:#fff;color:var(--brand);box-shadow:0 5px 13px rgba(60,72,140,.12)}
  .archive-close{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:rgba(255,255,255,.72);
    display:grid;place-items:center;cursor:pointer;color:var(--ink);font-size:25px;line-height:1}
  .archive-gallery{padding:22px 24px 28px;overflow:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:18px;align-content:start}
  .archive-card{border:1px solid var(--line);background:rgba(255,255,255,.62);border-radius:16px;overflow:hidden;
    box-shadow:0 10px 28px rgba(60,72,140,.10);transition:transform .18s,box-shadow .18s,border-color .18s}
  .archive-card:hover{transform:translateY(-3px);box-shadow:0 18px 42px rgba(60,72,140,.16);border-color:rgba(38,155,154,.30)}
  .archive-cover{aspect-ratio:16/9;background:#eef2f7;position:relative;overflow:hidden}
  .archive-cover img{width:100%;height:100%;object-fit:cover;display:block}
  .archive-cover.empty{display:grid;place-items:center;color:rgba(70,91,199,.36);font-size:38px;font-weight:900}
  .archive-uploaded{position:absolute;right:10px;top:10px;border-radius:999px;padding:3px 9px;background:rgba(16,185,129,.88);
    color:#fff;font-size:12px;font-weight:800;box-shadow:0 6px 16px rgba(16,185,129,.22)}
  .archive-card-body{padding:12px}
  .archive-name{font-size:14px;font-weight:800;line-height:1.35;min-height:38px;display:-webkit-box;-webkit-line-clamp:2;
    -webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
  .archive-seq{display:inline-block;margin-right:6px;color:var(--brand);font-weight:900}
  .archive-meta{font-size:12px;color:var(--mut);margin-top:7px;display:flex;gap:7px;flex-wrap:wrap}
  .archive-actions{display:flex;gap:8px;margin-top:10px}
  .archive-actions .qtool{padding:6px 9px}
  .archive-empty{grid-column:1/-1;min-height:220px;display:grid;place-items:center;text-align:center;color:var(--mut);
    border:1px dashed var(--line);border-radius:16px;background:rgba(255,255,255,.4)}
  @media(max-width:720px){.archive-library{inset:10px;border-radius:22px}.archive-library-head{padding:17px 16px 12px}
    .archive-library-title{font-size:21px}.archive-library-tools{gap:8px}.archive-sort-btn{padding:6px 8px}
    .archive-gallery{padding:16px;grid-template-columns:1fr}.archive-close{width:34px;height:34px}}
  .confirm-overlay{position:fixed;inset:0;z-index:120;display:none;place-items:center;padding:22px;background:rgba(31,38,62,.30);
    backdrop-filter:saturate(145%) blur(14px);-webkit-backdrop-filter:saturate(145%) blur(14px)}
  .confirm-overlay.open{display:grid}
  .confirm-card{width:min(480px,100%);border-radius:22px;background:rgba(248,250,255,.88);border:1px solid rgba(255,255,255,.76);
    box-shadow:0 26px 74px rgba(37,48,93,.32);padding:22px;transform:translateY(6px);animation:popin .18s ease-out forwards}
  @keyframes popin{to{transform:translateY(0)}}
  .confirm-head{display:flex;gap:13px;align-items:center}
  .confirm-icon{width:38px;height:38px;border-radius:13px;display:grid;place-items:center;background:#263b86;color:#fff5c8;
    box-shadow:0 9px 22px rgba(38,61,140,.20);font-size:18px;flex:none}
  .confirm-title{font-size:18px;font-weight:900;color:var(--ink);line-height:1.2}
  .confirm-body{margin:14px 0 0;color:#58627d;font-size:14px;line-height:1.75}
  .confirm-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
  .confirm-actions .btn{margin-top:0;min-width:92px}
  .main{min-width:0}

  /* 顶部控制条 + 产线状态 */
  .top{display:flex;align-items:center;gap:18px;background:var(--card);border:1px solid var(--glass);
    border-radius:18px;box-shadow:var(--sh-sm);padding:14px 18px;margin-bottom:22px;flex-wrap:wrap;
    backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur)}
  .runall{padding:12px 24px;border:0;border-radius:12px;cursor:pointer;color:#fff;font-size:15px;font-weight:700;
    background:var(--brand);box-shadow:0 8px 20px rgba(63,87,159,.18);transition:.2s;white-space:nowrap}
  .runall:hover{filter:brightness(1.06);transform:translateY(-1px)}
  .runall:disabled{opacity:.5;cursor:not-allowed;box-shadow:none;transform:none}
  .runall.secondary{background:var(--soft);border:1px solid var(--line);color:var(--ink);box-shadow:none}
  .strip{display:flex;align-items:center;flex:1;min-width:0;overflow:hidden}
  .snode{display:flex;align-items:center;gap:8px;cursor:pointer}
  .sdot{width:30px;height:30px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:13px;font-weight:800;
    background:var(--soft);border:1px solid var(--line);color:var(--mut);transition:.25s}
  .sname{font-size:12px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:88px}
  .sconn{flex:1;height:3px;margin:0 6px;border-radius:3px;background:#e1e5f1;position:relative;overflow:hidden;min-width:10px}
  .sconn.flow::after{content:"";position:absolute;inset:0;
    background:rgba(78,143,154,.55);background-size:50% 100%;
    animation:slide 1.1s linear infinite}
  @keyframes slide{from{background-position:-50% 0}to{background-position:150% 0}}
  .sconn.done{background:var(--ok)}
  .snode.done .sdot{background:var(--ok);border-color:var(--ok);color:#fff}
  .snode.running .sdot{background:var(--run);border-color:var(--run);color:#fff;animation:bp 1.6s infinite}
  .snode.error .sdot{background:var(--err);border-color:var(--err);color:#fff}
  .snode.done .sname,.snode.running .sname{color:var(--ink)}
  @keyframes bp{0%{box-shadow:0 0 0 0 rgba(217,164,65,.44)}70%{box-shadow:0 0 0 9px rgba(217,164,65,0)}100%{box-shadow:0 0 0 0 rgba(217,164,65,0)}}

  /* 2×3 卡片网格：行高一致，卡片等大 */
  #cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;align-items:stretch;
    grid-auto-rows:minmax(440px,auto)}
  @media(max-width:1080px){#cards{grid-template-columns:repeat(2,1fr)}}
  /* 步骤卡（毛玻璃） */
  .card{background:var(--card);border:1px solid var(--glass);border-radius:20px;box-shadow:var(--sh-sm);
    overflow:hidden;transition:box-shadow .25s,border-color .25s,transform .25s;
    backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
    display:flex;flex-direction:column}
  .card:hover{transform:translateY(-2px);box-shadow:var(--sh)}
  .card.running{border-color:rgba(217,164,65,.48)}
  .card.done{border-color:rgba(16,185,129,.4)}
  .chead{display:flex;align-items:center;gap:15px;padding:17px 20px}
  .ring{--p:0;width:46px;height:46px;flex:none;border-radius:50%;display:grid;place-items:center;
    background:radial-gradient(closest-side,#fff 78%,transparent 79%),
      conic-gradient(var(--rc,var(--brand)) calc(var(--p)*1%),#e9ecf6 0)}
  .ico{font-size:17px;font-weight:800;color:var(--mut)}
  .ctit{flex:1;min-width:0}
  .cnm{font-size:17px;font-weight:700}
  .pill{display:inline-block;margin-top:2px;font-size:12px;padding:2px 11px;border-radius:20px;background:var(--soft);color:var(--mut)}
  .card.done .ring{--rc:var(--ok)}.card.done .ico{color:var(--ok)}
  .card.done .pill{background:rgba(16,185,129,.12);color:var(--ok)}
  .card.running .ring{--rc:var(--run)}.card.running .ico{color:var(--run)}
  .card.running .pill{background:rgba(217,164,65,.14);color:#9a6a10}
  .card.error .ring{--rc:var(--err)}.card.error .pill{background:rgba(244,71,107,.12);color:var(--err)}
  .card.ready .ring{--rc:var(--brand)}.card.ready .ico{color:var(--brand)}
  .spin{width:17px;height:17px;border:3px solid rgba(217,164,65,.28);border-top-color:var(--run);border-radius:50%;animation:rot .8s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  .chk{font-size:19px;color:var(--ok)}
  /* 头部细进度条 */
  .hbar{height:3px;background:transparent}
  .hbar>i{display:block;height:100%;width:0;background:var(--brand);transition:width .4s}
  .card.done .hbar>i{background:var(--ok)}

  .body{display:flex;flex-direction:column;padding:6px 20px 20px;flex:1}
  .body>[id^="cfg-"]{min-height:184px}
  label{display:block;font-size:13px;color:var(--mut);margin:13px 0 6px}
  input[type=text],select,textarea{width:100%;padding:11px 13px;background:var(--soft);border:1px solid var(--line);
    border-radius:11px;color:var(--ink);font-size:14px;outline:none;font-family:inherit}
  textarea{resize:vertical;min-height:72px}
  input:focus,select:focus,textarea:focus{border-color:var(--brand);background:#fff}
  .rowf{display:flex;gap:14px;flex-wrap:wrap}.rowf>div{flex:1;min-width:200px}
  .tabs{display:flex;gap:9px;margin-bottom:4px;max-width:420px}
  .tab{flex:1;text-align:center;padding:10px;border:1px solid var(--line);border-radius:11px;cursor:pointer;
    color:var(--mut);background:var(--soft);font-size:14px;transition:.2s;display:flex;align-items:center;justify-content:center;gap:6px}
  .tab.on{color:#fff;border-color:transparent;background:var(--brand)}
  .radio{display:inline-flex;gap:6px;align-items:center;margin-right:18px;font-size:14px;cursor:pointer}
  .drop{border:1.6px dashed #c9d0e6;border-radius:13px;padding:22px;text-align:center;color:var(--mut);cursor:pointer;background:var(--soft);max-width:520px}
  .drop.hover{border-color:var(--brand);color:var(--ink);background:#fff}
  .btn{margin-top:16px;padding:11px 24px;border:0;border-radius:12px;cursor:pointer;color:#fff;font-size:15px;font-weight:700;
    background:var(--brand);box-shadow:0 8px 20px rgba(63,87,159,.18);transition:.2s;
    display:inline-flex;align-items:center;justify-content:center;gap:7px;min-height:43px}
  .btn:hover{filter:brightness(1.05);transform:translateY(-1px)}
  .btn:disabled{opacity:.5;cursor:not-allowed;box-shadow:none;transform:none}
  .btn.ghost{background:var(--soft);border:1px solid var(--line);color:var(--ink);font-weight:600;font-size:14px;padding:10px 16px;margin-top:0;box-shadow:none}
  .btn.danger{background:rgba(244,71,107,.06);border:1px solid rgba(244,71,107,.22);color:#b93b54;box-shadow:none}
  .body .btn.ghost{margin-top:16px}
  .step-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:16px;padding-top:0}
  .hide{display:none!important}
  .bar{height:9px;background:var(--soft);border-radius:6px;overflow:hidden;margin:16px 0 4px}
  .bar>i{display:block;height:100%;width:0;border-radius:6px;background:var(--brand);transition:width .4s}
  .pctn{font-size:12px;color:var(--mut)}
  .logtoggle{margin-top:12px;font-size:13px;color:var(--brand);cursor:pointer;user-select:none}
  .log{background:#0f1320;border:1px solid #20263b;border-radius:11px;padding:11px;height:150px;overflow:auto;
    font:12px/1.6 Consolas,monospace;color:#aeb8cf;margin-top:8px}
  .log .s{color:#7aa2ff}
  .preview{margin-top:18px;border-top:1px dashed var(--line);padding-top:16px}
  .ptitle{font-size:13px;color:var(--mut);margin-bottom:9px;font-weight:600}
  .list{max-height:280px;overflow:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  .cue{display:flex;gap:11px;padding:8px 12px;border-bottom:1px solid var(--line);font-size:13px}
  .cue:last-child{border-bottom:0}
  .cue .tc{color:var(--mut);font-family:Consolas,monospace;font-size:11px;white-space:nowrap;padding-top:2px}
  .cue .en{color:var(--mut);font-size:12px}
  video{width:100%;margin-top:8px;border-radius:12px;background:#000}
  audio{width:100%;margin-top:8px;border-radius:12px;background:transparent;display:block}
  .audio-shell{margin-top:8px;padding:5px;background:rgba(255,255,255,.74);border:1px solid var(--line);
    border-radius:14px;box-shadow:inset 0 1px 0 rgba(255,255,255,.65);overflow:hidden}
  .audio-shell audio{margin:0;border-radius:10px}
  .audio-shell audio::-webkit-media-controls-enclosure{border-radius:10px;background:#f8fafc}
  .audio-shell audio::-webkit-media-controls-panel{background:#f8fafc}
  .audio-speed-row{display:flex;align-items:center;gap:10px;max-width:560px}
  .audio-speed-row select{flex:0 0 120px}
  .audio-speed-row .audio-shell{flex:1;min-width:260px;margin-top:0}
  @media(max-width:620px){.audio-speed-row{flex-wrap:wrap}.audio-speed-row select,.audio-speed-row .audio-shell{flex:1 1 100%;min-width:0}}
  img.cover{max-width:520px;width:100%;border-radius:12px;margin-top:8px;box-shadow:var(--sh-sm)}
  .dl{display:inline-block;margin:12px 10px 0 0;padding:11px 20px;border-radius:11px;color:#fff;font-weight:700;text-decoration:none;font-size:14px;
    background:var(--ok);box-shadow:0 8px 18px rgba(16,185,129,.20)}
  .dl.alt{background:var(--soft);color:var(--ink);box-shadow:none;border:1px solid var(--line)}
  .tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
  .tag{background:rgba(70,91,199,.10);color:var(--brand);padding:4px 12px;border-radius:20px;font-size:13px}
  .errbox{background:rgba(244,71,107,.08);border:1px solid rgba(244,71,107,.4);color:#c0304f;padding:11px;border-radius:11px;margin-top:12px;white-space:pre-wrap;font-size:13px}
  .fn{margin-top:7px;font-size:13px;color:var(--ok)}
  .hint{font-size:12px;color:var(--mut);margin-top:7px}
  .est{font-size:12px;color:var(--mut);margin-top:3px}
  .sample-warmup{position:fixed;right:22px;bottom:22px;z-index:20;min-width:220px;
    background:rgba(255,255,255,.88);border:1px solid var(--glass);border-radius:12px;
    box-shadow:var(--sh-sm);padding:10px 13px;color:var(--ink);font-size:13px;
    backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur)}
  .sample-warmup .mini{height:4px;background:#e1e5f1;border-radius:4px;overflow:hidden;margin-top:7px}
  .sample-warmup .mini>i{display:block;height:100%;width:0;background:var(--brand)}
  .seclbl{margin-top:16px;font-size:13px;color:var(--ink);font-weight:700}
  .subprev{position:relative;height:210px;border-radius:14px;margin-top:8px;overflow:hidden;
    background:linear-gradient(135deg,#243049,#3a2c56 60%,#2b3a4a);display:flex;justify-content:center;
    align-items:flex-end;padding:20px;border:1px solid var(--glass)}
  .subprev::after{content:"画面示意";position:absolute;top:10px;left:14px;font-size:12px;color:rgba(255,255,255,.45)}
  #sub-prev-text{max-width:92%;text-align:center;line-height:1.35;word-break:break-word;position:relative;z-index:3}
  /* 原片烧死的英文字幕（示意）：盖底条开启时被遮住 */
  .sub-prev-orig{position:absolute;left:0;right:0;bottom:12%;z-index:1;text-align:center;pointer-events:none;
    font-size:clamp(13px,3.2vw,21px);font-weight:700;color:#fff;font-style:italic;
    text-shadow:-1.5px -1.5px 0 #000,1.5px -1.5px 0 #000,-1.5px 1.5px 0 #000,1.5px 1.5px 0 #000}
  .sub-prev-cover{position:absolute;left:0;right:0;bottom:0;height:18%;z-index:2;background:#000;opacity:.6;
    display:none;pointer-events:none}
  .sub-prev-cover.on{display:block}
  .cover-editor{position:relative;aspect-ratio:16/9;max-width:520px;margin-top:8px;border-radius:12px;overflow:hidden;
    border:1px solid var(--line);background:#202431;box-shadow:var(--sh-sm)}
  .cover-editor img{width:100%;height:100%;object-fit:cover;display:block}
  .cover-title{position:absolute;left:47%;top:10%;width:53%;cursor:move;user-select:none;
    color:#ffeb00;font-weight:900;line-height:1.08;text-shadow:3px 3px 0 #050505,-3px 3px 0 #050505,3px -3px 0 #050505,-3px -3px 0 #050505;
    background:rgba(0,0,0,.34);border:1px dashed rgba(255,255,255,.55);border-radius:8px;padding:8px;word-break:break-word}
  .cover-resize{position:absolute;right:3px;bottom:3px;width:14px;height:14px;border-right:3px solid rgba(255,255,255,.85);
    border-bottom:3px solid rgba(255,255,255,.85);cursor:nwse-resize}
  .compact-row{display:flex;gap:10px;align-items:center}
  .compact-row>*{min-width:0}
  .subtitle-controls{display:grid;grid-template-columns:1.2fr .9fr .85fr;gap:10px;max-width:560px}
  .subtitle-controls>*{min-width:0}
  .subtitle-controls select,.subtitle-controls input{min-width:0}
  .subtitle-controls label{margin-top:13px}
  .preview-toggle{margin-top:10px;border:1px solid var(--line);background:rgba(255,255,255,.58);border-radius:11px;
    padding:9px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:var(--ink);font-weight:700;font-size:13px}
  .preview-toggle span{color:var(--mut);font-weight:600}
  .cover-edit-wrap{margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="head-main">
      <h1 class="brand-title"><span class="brand-mark" aria-hidden="true"></span><span>星星点灯</span></h1>
      <p class="brand-slogan">照亮阴影，点亮个体化之路。</p>
      <p class="brand-desc">为荣格心理学视频搭建的六步自动化创作台。</p>
    </div>
    <div class="gpu" id="gpu-box">
      <div class="gpu-top"><span class="gpu-name" id="gpu-name">GPU 状态</span><span id="gpu-time">--</span></div>
      <div class="gpu-grid">
        <span>占用 <b id="gpu-util">--</b></span><span>显存 <b id="gpu-mem">--</b></span>
        <span>温度 <b id="gpu-temp">--</b></span><span>功耗 <b id="gpu-power">--</b></span>
      </div>
      <div class="gpu-bar"><i id="gpu-bar"></i></div>
    </div>
  </div>

  <div class="app">
    <aside class="side">
      <section class="queue-panel">
        <div class="qhead">
          <div>
            <div class="qtitle">星星队列</div>
            <div class="qsum" id="qsum">0 颗星</div>
          </div>
        </div>
        <label>添加星星链接（可一次粘贴多行）</label>
        <textarea id="queue-links" class="qinput" placeholder="https://...&#10;https://..."></textarea>
        <div class="qactions">
          <button class="btn ghost" onclick="addQueueLinks()">加入星星队列</button>
          <button class="btn" id="runqueue" onclick="runQueue()">按顺序点亮</button>
          <button class="btn ghost" id="pausequeue" onclick="pauseQueue()">暂停</button>
          <button class="btn danger" id="stopqueue" onclick="stopQueue()">停止</button>
          <button class="btn ghost" id="resumequeue" onclick="resumeQueue()">继续</button>
        </div>
        <div class="hint">点击星星项查看步骤详情；完成后可打开输出文件夹。</div>
        <div class="qlist" id="queue-list"></div>
      </section>

      <section class="archive-launcher">
        <button class="archive-btn" onclick="openArchiveLibrary()">
          <span class="archive-ico">▦</span>
          <span class="archive-btn-main">
            <span class="archive-title">灯火档案</span>
            <span class="archive-count" id="archive-count">0 个已上传</span>
          </span>
          <span class="archive-arrow">›</span>
        </button>
      </section>
    </aside>

    <main class="main">
      <div class="top">
        <button class="runall" id="runall" onclick="runAll()">一键点亮当前任务</button>
        <button class="runall secondary" id="rerunall" onclick="rerunFrom('download')">重新点亮全部</button>
        <div class="strip" id="strip"></div>
      </div>
      <div id="cards"></div>
    </main>
  </div>
</div>
<div class="archive-overlay" id="archive-overlay" aria-hidden="true">
  <div class="archive-scrim" onclick="closeArchiveLibrary()"></div>
  <section class="archive-library" role="dialog" aria-modal="true" aria-labelledby="archive-library-title">
    <div class="archive-library-head">
      <div>
        <div class="archive-library-kicker">Archive</div>
        <div class="archive-library-title" id="archive-library-title">灯火档案</div>
        <div class="archive-library-count" id="archive-library-count">0 个已上传</div>
      </div>
      <div class="archive-library-tools">
        <div class="archive-sort" aria-label="档案排序方式">
          <button class="archive-sort-btn active" id="archive-sort-desc" onclick="setArchiveSort('desc')" aria-pressed="true">新→旧</button>
          <button class="archive-sort-btn" id="archive-sort-asc" onclick="setArchiveSort('asc')" aria-pressed="false">旧→新</button>
        </div>
        <button class="archive-close" onclick="closeArchiveLibrary()" aria-label="关闭">×</button>
      </div>
    </div>
    <div class="archive-gallery" id="archive-gallery"></div>
  </section>
</div>
<div id="sample-warmup" class="sample-warmup hide">
  <div id="sample-warmup-text">正在准备试听音色</div>
  <div class="mini"><i id="sample-warmup-bar"></i></div>
</div>
<div class="confirm-overlay" id="confirm-overlay" aria-hidden="true">
  <section class="confirm-card" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
    <div class="confirm-head">
      <div class="confirm-icon">✦</div>
      <div>
        <div class="confirm-title" id="confirm-title">确认操作</div>
      </div>
    </div>
    <div class="confirm-body" id="confirm-body"></div>
    <div class="confirm-actions">
      <button class="btn ghost" id="confirm-cancel">取消</button>
      <button class="btn" id="confirm-ok">确认</button>
    </div>
  </section>
</div>

<script>
const API="";
let JOB=null,CFG=null,ST=null,QST=null,ARCHIVES=[],prev={},dlFile=null,coverFile=null,coverImgUrl="",srcMode="link",jobES=null,queueES=null;
let ARCHIVE_SORT=localStorage.getItem("archiveSort")||"desc";
const logOpen=new Set(), pvOpen=new Set();

const STEPS=[
  {key:"download",name:"视频下载"},{key:"asr",name:"语音识别"},{key:"translate",name:"中文翻译"},
  {key:"tts",name:"中文配音"},{key:"compose",name:"视频合成"},{key:"publish",name:"灯火归档"},
];
const BADGE={pending:"待点灯",running:"点灯中",done:"已点亮",error:"出错"};

async function init(){
  CFG=await (await fetch(API+"/api/config")).json();
  JOB=(await (await fetch(API+"/api/jobs",{method:"POST"})).json()).job_id;
  buildStrip(); buildCards(); openSSE(); openQueueSSE(); startSampleWarmup(); startGpuStatus(); startArchivePoll();
}
function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function escAttr(s){return esc(s).replace(/"/g,"&quot;");}
function fmt(s){s=Math.max(0,s|0);const m=(s/60)|0,x=s%60;return `${String(m).padStart(2,"0")}:${String(x).padStart(2,"0")}`;}
function fmtDur(s){s=Math.max(0,Math.round(+s||0));const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),x=s%60;
  if(h)return `${h}时${String(m).padStart(2,"0")}分`;
  if(m)return `${m}分${String(x).padStart(2,"0")}秒`;
  return `${x}秒`;}
function fmtDate(ts){
  const n=+ts||0;
  if(!n)return "--";
  const d=new Date(n<1e12?n*1000:n);
  if(Number.isNaN(d.getTime()))return "--";
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function fmtDateTime(ts){
  const n=+ts||0;
  if(!n)return "--";
  const d=new Date(n<1e12?n*1000:n);
  if(Number.isNaN(d.getTime()))return "--";
  const m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0");
  const hh=String(d.getHours()).padStart(2,"0"),mm=String(d.getMinutes()).padStart(2,"0");
  return `${d.getFullYear()}-${m}-${day} ${hh}:${mm}`;
}
function fmtSize(bytes){
  bytes=+bytes||0;
  if(bytes>=1024*1024*1024)return `${(bytes/1024/1024/1024).toFixed(1)}G`;
  if(bytes>=1024*1024)return `${(bytes/1024/1024).toFixed(0)}M`;
  if(bytes>=1024)return `${(bytes/1024).toFixed(0)}K`;
  return `${bytes}B`;
}
function shortUrl(url){
  try{
    const u=new URL(url);
    const id=u.searchParams.get("v");
    const path=(u.pathname||"").replace(/\/$/,"");
    return `${u.hostname.replace(/^www\./,"")}${id?` / ${id}`:(path?` ${path.slice(0,28)}`:"")}`;
  }catch(_){
    return (url||"").slice(0,46);
  }
}
function elem(h){const t=document.createElement("template");t.innerHTML=h.trim();return t.content.firstChild;}
function fmtMem(mb){mb=+mb||0;return mb>=1024?`${(mb/1024).toFixed(1)}G`:`${Math.round(mb)}M`;}
function setGpuUnavailable(msg){
  const name=document.getElementById("gpu-name"),util=document.getElementById("gpu-util"),mem=document.getElementById("gpu-mem");
  const temp=document.getElementById("gpu-temp"),power=document.getElementById("gpu-power"),bar=document.getElementById("gpu-bar"),timeEl=document.getElementById("gpu-time");
  if(name)name.textContent=msg||"GPU 不可用"; if(util)util.textContent="--"; if(mem)mem.textContent="--";
  if(temp)temp.textContent="--"; if(power)power.textContent="--"; if(bar)bar.style.width="0%"; if(timeEl)timeEl.textContent="--";
}
async function refreshGpuStatus(){
  try{
    const d=await (await fetch(`${API}/api/gpu-status`,{cache:"no-store"})).json();
    if(!d.available||!d.gpus||!d.gpus.length){setGpuUnavailable(d.error||"GPU 不可用");return;}
    const g=d.gpus[0], memPct=Math.max(0,Math.min(100,+g.memory_pct||0));
    document.getElementById("gpu-name").textContent=`GPU ${g.index}: ${g.name||"NVIDIA"}`;
    document.getElementById("gpu-util").textContent=g.util==null?"--":`${Math.round(+g.util)}%`;
    document.getElementById("gpu-mem").textContent=`${fmtMem(g.memory_used)} / ${fmtMem(g.memory_total)} (${memPct.toFixed(0)}%)`;
    document.getElementById("gpu-temp").textContent=g.temperature==null?"--":`${Math.round(+g.temperature)}℃`;
    document.getElementById("gpu-power").textContent=g.power_draw==null?"--":
      (g.power_limit==null?`${(+g.power_draw).toFixed(0)}W`:`${(+g.power_draw).toFixed(0)} / ${(+g.power_limit).toFixed(0)}W`);
    document.getElementById("gpu-bar").style.width=`${memPct}%`;
    document.getElementById("gpu-time").textContent=new Date().toLocaleTimeString("zh-CN",{hour12:false});
  }catch(_){setGpuUnavailable("GPU 状态读取失败");}
}
function startGpuStatus(){refreshGpuStatus();setInterval(refreshGpuStatus,2000);}

// ---------- 顶部产线状态 ----------
function buildStrip(){
  const s=document.getElementById("strip");let h="";
  STEPS.forEach((st,i)=>{
    h+=`<div class="snode" id="sn-${st.key}" onclick="goCard('${st.key}')">
      <div class="sdot" id="sd-${st.key}">${i+1}</div><div class="sname">${st.name}</div></div>`;
    if(i<STEPS.length-1)h+=`<div class="sconn" id="sc-${i}"></div>`;
  });
  s.innerHTML=h;
}
function goCard(k){document.getElementById("card-"+k).scrollIntoView({behavior:"smooth",block:"center"});}

// ---------- 步骤卡 ----------
function buildCards(){
  const root=document.getElementById("cards");root.innerHTML="";
  STEPS.forEach((st,i)=>{
    const card=elem(`<div class="card" id="card-${st.key}">
      <div class="hbar"><i id="hb-${st.key}"></i></div>
      <div class="chead">
        <div class="ring" id="rg-${st.key}"><span class="ico" id="ic-${st.key}">${i+1}</span></div>
        <div class="ctit"><div class="cnm">${st.name}</div><div class="pill" id="pl-${st.key}">待点灯</div><div class="est" id="est-${st.key}"></div></div></div>
      <div class="body">
        <div id="cfg-${st.key}"></div>
        <div class="step-actions">
          <button class="btn" id="rb-${st.key}" onclick="run('${st.key}')">${st.key==="publish"?"归档灯火":"点亮此步"}</button>
          <button class="btn ghost" id="rr-${st.key}" onclick="rerunFrom('${st.key}')">从此步重燃</button>
        </div>
        <div class="bar hide" id="bw-${st.key}"><i id="bp-${st.key}"></i></div>
        <div class="logtoggle" id="lt-${st.key}" onclick="toggleLog('${st.key}')">▸ 点灯日志</div>
        <div class="log hide" id="lg-${st.key}"></div>
        <div class="errbox hide" id="eb-${st.key}"></div>
        <div class="logtoggle hide" id="ptg-${st.key}" onclick="togglePv('${st.key}')">▾ 输出结果</div>
        <div class="preview hide" id="pv-${st.key}"></div>
      </div></div>`);
    root.appendChild(card);
    document.getElementById("cfg-"+st.key).innerHTML=cfgHtml(st.key);
  });
  wireDownload(); wireCompose(); wireCoverEditor(); onTtsEngineChange();
}
function toggleLog(k){logOpen.has(k)?logOpen.delete(k):logOpen.add(k);syncLog(k);}
function syncLog(k){const o=logOpen.has(k);document.getElementById("lg-"+k).classList.toggle("hide",!o);
  document.getElementById("lt-"+k).textContent=(o?"▾":"▸")+" 点灯日志";}
function togglePv(k){
  if(pvOpen.has(k)){pvOpen.delete(k);syncPv(k);return;}
  loadPreview(k,true);
}
function syncPv(k){const o=pvOpen.has(k);document.getElementById("pv-"+k).classList.toggle("hide",!o);
  document.getElementById("ptg-"+k).textContent=(o?"▾":"▸")+" 输出结果";}

function ttsEngine(key){return (CFG.tts_engines||[]).find(e=>e.key===key)||null;}
function curTtsEngineKey(){const sel=document.getElementById("tts-engine");return (sel&&sel.value)||CFG.tts_engine_default;}
function engineOptions(){return (CFG.tts_engines||[]).map(e=>{
  const dis=e.available?"":" disabled";
  const tag=e.available?"":"（未配置）";
  return `<option value="${e.key}" ${e.key===CFG.tts_engine_default?"selected":""}${dis}>${e.name}${tag}</option>`;}).join("");}
let sampleStatus={}, samplePrepareRequested={}, currentSampleAudio=null,currentSampleUrl="";
function voiceOptions(engineKey, selectedVoice){
  const key=engineKey||curTtsEngineKey();
  const e=ttsEngine(key);
  if(!e)return "";
  const def=(e.key===CFG.tts_engine_default&&CFG.voice_default&&e.voices.includes(CFG.voice_default))?CFG.voice_default:e.default_voice;
  const picked=e.voices.includes(selectedVoice)?selectedVoice:def;
  const st=sampleStatus[key]||{};
  const ready=new Set(st.ready||[]);
  return e.voices.map(v=>{
    const state=ready.has(v)?"已缓存":(st.running?"正在生成":"未缓存");
    return `<option value="${escAttr(v)}" ${v===picked?"selected":""}>${esc(v)}（${state}）</option>`;
  }).join("");}
function renderVoiceOptions(engineKey){
  const sel=document.getElementById("tts-voice");if(!sel)return;
  sel.innerHTML=voiceOptions(engineKey||curTtsEngineKey(),sel.value);
}
function onTtsEngineChange(){
  const e=ttsEngine(curTtsEngineKey());
  renderVoiceOptions();
  const tip=document.getElementById("tts-engine-tip");
  if(tip)tip.innerHTML=(e&&!e.available)?('⚠ 暂不可用：'+esc(e.hint||"该引擎未就绪")):"";
  const f5Box=document.getElementById("f5-parallel-box");
  if(f5Box)f5Box.classList.toggle("hide",curTtsEngineKey()!=="f5");
  refreshCurrentEngineSampleStatus();
}
function getSpeed(){const s=document.getElementById("tts-speed");return s?(+s.value).toFixed(2):"1.00";}
function speedOptions(){
  const opts=[0.75,0.85,0.9,0.95,1.0,1.05,1.1,1.15,1.2,1.25,1.3,1.4,1.5], cur=+(CFG.speed_default||1.0);
  let best=opts[0], diff=Infinity;
  opts.forEach(x=>{const d=Math.abs(x-cur);if(d<diff){best=x;diff=d;}});
  return opts.map(x=>`<option value="${x.toFixed(2)}" ${x===best?"selected":""}>${x.toFixed(2)}x</option>`).join("");
}
function f5ParallelOptions(){
  const cur=Math.max(1,Math.min(4,+(CFG.f5_parallel_default||2)));
  return [1,2,3,4].map(x=>`<option value="${x}" ${x===cur?"selected":""}>${x} 条</option>`).join("");
}
let warmupTimer=null;
function setWarmup(d){
  const box=document.getElementById("sample-warmup"),txt=document.getElementById("sample-warmup-text"),bar=document.getElementById("sample-warmup-bar");
  if(!box||!txt||!bar)return;
  if(!d||!d.running){box.classList.add("hide");return;}
  const total=Math.max(+d.total||0,1), done=Math.max(+d.done||0,0);
  txt.textContent=`正在准备试听音色 ${Math.min(done,total)}/${total}`;
  bar.style.width=`${Math.min(100,Math.round(done/total*100))}%`;
  box.classList.remove("hide");
}
async function pollSampleWarmup(){
  try{
    const r=await fetch(`${API}/api/voice-sample/prepare-status`);
    const d=await r.json();
    setWarmup(d);
    refreshCurrentEngineSampleStatus();
    if(d.running&&!warmupTimer)warmupTimer=setInterval(pollSampleWarmup,2000);
    if(!d.running&&warmupTimer){clearInterval(warmupTimer);warmupTimer=null;}
  }catch(_){setWarmup(null);}
}
async function refreshCurrentEngineSampleStatus(){
  const e=ttsEngine(curTtsEngineKey());
  if(!e||!e.available)return;
  try{
    const r=await fetch(`${API}/api/voice-sample/prepare-status?engine=${encodeURIComponent(e.key)}`);
    const d=await r.json();
    sampleStatus[e.key]=d;
    renderVoiceOptions(e.key);
    if((+d.done||0)<(+d.total||0)&&!d.running)ensureEngineSamples(e.key);
  }catch(_){}
}
async function ensureEngineSamples(engineKey){
  const now=Date.now();
  if(samplePrepareRequested[engineKey]&&now-samplePrepareRequested[engineKey]<5000)return;
  samplePrepareRequested[engineKey]=now;
  sampleStatus[engineKey]={...(sampleStatus[engineKey]||{}),running:true};
  renderVoiceOptions(engineKey);
  try{
    await fetch(`${API}/api/voice-sample/prepare`,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({engine:engineKey})});
    pollSampleWarmup();
  }catch(_){}
}
async function startSampleWarmup(){
  try{
    await fetch(`${API}/api/voice-sample/prepare`,{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
    pollSampleWarmup();
  }catch(_){setWarmup(null);}
}

function wireDownload(){
  document.querySelectorAll("#cfg-download .tab").forEach(t=>t.onclick=()=>{

    document.getElementById("dl-file").classList.toggle("hide",srcMode!=="file");});
  const drop=document.getElementById("drop"),fi=document.getElementById("file");
  drop.onclick=()=>fi.click();
  fi.onchange=()=>{if(fi.files[0]){dlFile=fi.files[0];document.getElementById("fn").textContent=dlFile.name;}};
  ["dragover","dragenter"].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add("hover");}));

}

function wireCoverEditor(){
  const file=document.getElementById("cover-file"),img=document.getElementById("cover-img"),box=document.getElementById("cover-title-box"),editor=document.getElementById("cover-editor"),handle=document.getElementById("cover-resize");
  if(!file||!img||!box||!editor)return;
  if(CFG.default_cover_available)img.src=`${API}/api/default-cover.png?t=${Date.now()}`;
  file.onchange=()=>{const f=file.files&&file.files[0];if(!f)return;coverFile=f;if(coverImgUrl)URL.revokeObjectURL(coverImgUrl);
    coverImgUrl=URL.createObjectURL(f);img.src=coverImgUrl;};
  let drag=null,resize=null;
  if(handle)handle.onpointerdown=ev=>{ev.stopPropagation();resize={x:ev.clientX,width:box.offsetWidth};handle.setPointerCapture(ev.pointerId);};
  box.onpointerdown=ev=>{drag={x:ev.clientX,y:ev.clientY,left:box.offsetLeft,top:box.offsetTop};box.setPointerCapture(ev.pointerId);};
  box.onpointermove=ev=>{
    if(resize){
      const width=Math.max(editor.clientWidth*.25,Math.min(editor.clientWidth*.9,resize.width+ev.clientX-resize.x));
      box.style.width=(width/editor.clientWidth*100).toFixed(1)+"%";
      const w=document.getElementById("cover-width"),wv=document.getElementById("cover-width-val");
      if(w)w.value=String(Math.round(width/editor.clientWidth*100));
      if(wv)wv.textContent=Math.round(width/editor.clientWidth*100)+"%";
      return;
    }
    if(!drag)return;
    const maxL=editor.clientWidth-box.offsetWidth,maxT=editor.clientHeight-box.offsetHeight;
    const left=Math.max(0,Math.min(maxL,drag.left+ev.clientX-drag.x));
    const top=Math.max(0,Math.min(maxT,drag.top+ev.clientY-drag.y));
    box.style.left=(left/editor.clientWidth*100).toFixed(2)+"%";
    box.style.top=(top/editor.clientHeight*100).toFixed(2)+"%";
  };
  box.onpointerup=box.onpointercancel=()=>{drag=null;resize=null;};
  if(handle)handle.onpointerup=handle.onpointercancel=()=>{resize=null;};
  updateCoverPreviewStyle();updateCoverPreviewText();
}
function updateCoverPreviewText(){
  const text=document.getElementById("cover-title-text"),input=document.getElementById("cover-title-input");
  if(text)text.textContent=(input&&input.value.trim())||"封面标题";
}
function updateCoverPreviewStyle(){
  const box=document.getElementById("cover-title-box"),font=document.getElementById("cover-font"),w=document.getElementById("cover-width");
  if(!box)return;
  const fs=+(font&&font.value||112), width=+(w&&w.value||53);
  box.style.fontSize=Math.max(18,fs/1920*520)+"px";
  box.style.width=width+"%";
  const fv=document.getElementById("cover-font-val"),wv=document.getElementById("cover-width-val");
  if(fv)fv.textContent=String(fs);
  if(wv)wv.textContent=width+"%";
}
function curPreset(){const sel=document.getElementById("cm-preset");
  return (CFG.sub_presets.find(p=>p.key===(sel&&sel.value))||CFG.sub_presets[0]);}
function applySubPresetDefaults(){
  const s=curPreset(),fs=document.getElementById("cm-fontsize"),pos=document.getElementById("cm-position");
  if(fs)fs.value=String(s.fontsize||70);
  if(pos)pos.value=s.position||"bottom";
  updateSubPreview();
}
function subStyle(){
  const s={...curPreset()};
  const fs=document.getElementById("cm-fontsize"),pos=document.getElementById("cm-position");
  if(fs)s.fontsize=+fs.value||s.fontsize;
  if(pos)s.position=pos.value||s.position;
  return s;
}
function updateSubPreview(){
  const t=document.getElementById("sub-prev-text"),box=document.getElementById("sub-prev");if(!t)return;
  const s=subStyle();
  const h=box&&box.clientHeight?box.clientHeight:210;
  const px=(s.fontsize*h/1080).toFixed(1);   // 按 1080p 基准等比缩放
  const o=Math.max(1.2,px/16);
  t.style.fontFamily=`"${s.font}"`;
  t.style.fontSize=px+"px";
  t.style.color=s.primary;
  t.style.fontWeight=String(s.bold)==="1"?"800":"500";
  t.style.textShadow=`${-o}px ${-o}px 0 ${s.outline},${o}px ${-o}px 0 ${s.outline},${-o}px ${o}px 0 ${s.outline},${o}px ${o}px 0 ${s.outline}`;
  if(box)box.style.alignItems={bottom:"flex-end",middle:"center",top:"flex-start"}[s.position]||"flex-end";
  const covOn=document.getElementById("cm-cover"),on=!!(covOn&&covOn.checked);
  const covBox=document.getElementById("cm-cover-box");if(covBox)covBox.classList.toggle("hide",!on);
  const opEl=document.getElementById("cm-cover-op"),hEl=document.getElementById("cm-cover-h");
  const op=(+(opEl&&opEl.value)||90)/100,hh=(+(hEl&&hEl.value)||22);
  const opv=document.getElementById("cm-cover-op-val");if(opv)opv.textContent=Math.round(op*100)+"%";
  const hv=document.getElementById("cm-cover-h-val");if(hv)hv.textContent=hh+"%";
  const cov=document.getElementById("sub-prev-cover");
  if(cov){cov.classList.toggle("on",on);cov.style.opacity=String(op);cov.style.height=hh+"%";}
  const fv=document.getElementById("cm-fontsize-val");if(fv)fv.textContent=String(Math.round(s.fontsize));
}
function updateComposeAudioSpeed(){
  const audio=document.getElementById("cm-audio-preview");
  const sel=document.getElementById("cm-audio-speed");
  if(!audio||!sel)return;
  const rate=Math.max(0.5,Math.min(2.0,+sel.value||1));
  audio.playbackRate=rate;
  audio.preservesPitch=true;
  audio.mozPreservesPitch=true;
  audio.webkitPreservesPitch=true;
}
function updateComposeAudioPreview(force=false){
  const audio=document.getElementById("cm-audio-preview");
  if(!audio||!JOB)return;
  if(force||audio.dataset.job!==JOB){
    audio.dataset.job=JOB;
    audio.src=`${API}/api/jobs/${JOB}/dub.wav?t=${Date.now()}`;
  }
  audio.oncanplay=()=>updateComposeAudioSpeed();
  updateComposeAudioSpeed();
}

function collect(step,forceTts){const g=id=>document.getElementById(id);
  if(step==="download")return {url:(g("dl-url")||{}).value?.trim()||"",media:"video"};
  if(step==="asr")return {model:g("asr-model").value,language:g("asr-lang").value};
  if(step==="translate")return {engine:g("tr-engine").value};
  if(step==="tts")return {engine:(g("tts-engine")||{}).value||CFG.tts_engine_default,voice:g("tts-voice").value,
    speed:g("tts-speed").value,f5_parallel:+(g("f5-parallel")?.value||CFG.f5_parallel_default||2),force:!!forceTts};
  if(step==="compose")return {mode:"original",audio_speed:g("cm-audio-speed")?.value||"1.00",
    preset:g("cm-preset").value,
    fontsize:+(g("cm-fontsize")?.value||0),position:g("cm-position")?.value||"",
    bilingual:g("cm-bi").checked,burn:g("cm-burn").checked,
    cover_original:!!g("cm-cover")?.checked,
    cover_opacity:(+(g("cm-cover-op")?.value)||90)/100,
    cover_height:(+(g("cm-cover-h")?.value)||22)/100};
  if(step==="publish"){
    const box=g("cover-title-box"),ed=g("cover-editor");
    const x=box&&ed?(box.offsetLeft/Math.max(ed.clientWidth,1)):0.47;
    const y=box&&ed?(box.offsetTop/Math.max(ed.clientHeight,1)):0.10;
    return {platform:g("pb-platform").value,mode:"archive",
      cover_title:(g("cover-title-input")||{}).value||"",
      cover_x:x,cover_y:y,
      cover_font_size:+((g("cover-font")||{}).value||112),
      cover_width:+((g("cover-width")||{}).value||53)/100};}
  return {};}
function collectAll(){
  const cfgs={};STEPS.forEach(s=>cfgs[s.key]=collect(s.key,s.key==="tts"));
  const qi=currentQueueItem();
  if(qi&&!cfgs.download.url)cfgs.download.url=qi.url;
  return cfgs;
}

function confirmCard({title="确认操作",body="",okText="确认",cancelText="取消"}={}){
  const overlay=document.getElementById("confirm-overlay");
  const titleEl=document.getElementById("confirm-title"),bodyEl=document.getElementById("confirm-body");
  const ok=document.getElementById("confirm-ok"),cancel=document.getElementById("confirm-cancel");
  if(!overlay||!ok||!cancel)return Promise.resolve(window.confirm(body||title));
  titleEl.textContent=title;
  bodyEl.textContent=body;
  ok.textContent=okText;
  cancel.textContent=cancelText;
  overlay.classList.add("open");
  overlay.setAttribute("aria-hidden","false");
  document.body.classList.add("modal-open");
  return new Promise(resolve=>{
    const done=value=>{
      overlay.classList.remove("open");
      overlay.setAttribute("aria-hidden","true");
      document.body.classList.remove("modal-open");
      ok.onclick=cancel.onclick=overlay.onclick=null;
      document.removeEventListener("keydown",onKey);
      resolve(value);
    };
    const onKey=ev=>{if(ev.key==="Escape")done(false);};
    ok.onclick=()=>done(true);
    cancel.onclick=()=>done(false);
    overlay.onclick=ev=>{if(ev.target===overlay)done(false);};
    document.addEventListener("keydown",onKey);
  });
}

  if(!ok)return;
  const r=await fetch(`${API}/api/queue/items/${id}/mark-uploaded`,{method:"POST"});
  if(!r.ok){alert((await r.json().catch(()=>({}))).detail||"标记失败");return;}
  await refreshQueue();
  await refreshArchives();
}

async function openArchive(encoded,ev){
  ev.stopPropagation();
  const archive_dir=decodeURIComponent(encoded);
  const r=await fetch(`${API}/api/archives/open`,{
    method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({archive_dir})
  });
  if(!r.ok)alert((await r.json().catch(()=>({}))).detail||"打开失败");
}

async function markArchiveUploaded(encoded,ev){
  ev.stopPropagation();
  const archive_dir=decodeURIComponent(encoded);
  const ok=await confirmCard({
    title:"确认灯火已上传？",
    body:"确认后会清空该项目 cache 中的中间文件，保留归档中的成片、封面和发布信息。",
    okText:"确认上传",
  });
  if(!ok)return;
  const r=await fetch(`${API}/api/archives/mark-uploaded`,{
    method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({archive_dir})
  });
  if(!r.ok){alert((await r.json().catch(()=>({}))).detail||"标记失败");return;}
  await refreshArchives();
}

async function loadStateOnce(jobId){
  try{
    const r=await fetch(`${API}/api/jobs/${jobId}/state`);
    if(!r.ok||JOB!==jobId)return;
    ST=await r.json();
    apply();
    renderQueue();
  }catch(e){}
}
function selectJob(jobId){
  if(!jobId)return;
  const changed=jobId!==JOB;
  if(!changed){syncSelectedQueueUrl();renderQueue();updateComposeAudioPreview();loadStateOnce(jobId);return;}
  const reopen=[...pvOpen];               // 记住切换前展开的预览
  JOB=jobId;
  ST=null; prev={}; pvOpen.clear(); logOpen.clear();
  resetPreviews();                        // 清掉上一队列项残留的缓存内容
  openSSE();
  syncSelectedQueueUrl();
  updateComposeAudioPreview(true);
  renderQueue();
  loadStateOnce(jobId).then(()=>{         // 状态就绪后，按新队列项重新加载缓存
    if(JOB!==jobId||!ST)return;
    reopen.forEach(k=>{if(ST.steps[k]&&ST.steps[k].status==="done")loadPreview(k,true);});
  });
}
function resetPreviews(){
  STEPS.forEach(s=>{
    const pv=document.getElementById("pv-"+s.key);
    if(pv){pv.innerHTML="";pv.classList.add("hide");}
    const tg=document.getElementById("ptg-"+s.key);
    if(tg)tg.textContent="▸ 输出结果";
  });
}
function currentQueueItem(){return QST?(QST.items||[]).find(x=>x.job_id===JOB):null;}
function syncSelectedQueueUrl(){
  const qi=currentQueueItem(), input=document.getElementById("dl-url");
  if(qi&&input)input.value=qi.url;
}

async function run(step){
  const fd=new FormData();fd.append("step",step);const cfg=collect(step,true);
  if(step==="download"){
    const qi=currentQueueItem();
    if(qi&&!cfg.url)cfg.url=qi.url;
    if(srcMode==="file"){if(!dlFile){alert("请选择文件");return;}fd.append("file",dlFile);}
    else if(!cfg.url){alert("请填写链接");return;}}
  if(step==="publish"&&coverFile)fd.append("file",coverFile);
  fd.append("config_json",JSON.stringify(cfg));
  logOpen.add(step);syncLog(step);
  const r=await fetch(`${API}/api/jobs/${JOB}/run`,{method:"POST",body:fd});
  if(!r.ok)alert((await r.json().catch(()=>({}))).detail||"提交失败");
}

async function runAll(){
  const cfgs=collectAll();
  const qi=currentQueueItem();
  if(qi&&!cfgs.download.url)cfgs.download.url=qi.url;
  if(srcMode!=="file"&&!cfgs.download.url){alert("请先在第1步填写链接或上传文件");return;}
  const fd=new FormData();fd.append("configs_json",JSON.stringify(cfgs));
  if(srcMode==="file"&&dlFile)fd.append("file",dlFile);
  if(coverFile)fd.append("cover_file",coverFile);
  logOpen.add("download");syncLog("download");
  const r=await fetch(`${API}/api/jobs/${JOB}/run_all`,{method:"POST",body:fd});
  if(!r.ok)alert((await r.json().catch(()=>({}))).detail||"提交失败");
}

async function rerunFrom(step){
  if(!JOB)return;
  const cfgs=collectAll();
  if(step==="download"&&srcMode==="file"){alert("重新点亮全部暂时只支持星星队列链接；本地文件请重新上传后用一键点亮。");return;}
  if(step==="download"&&!cfgs.download.url){alert("从第1步重跑需要视频链接");return;}
  logOpen.add(step);syncLog(step);
  const r=await fetch(`${API}/api/jobs/${JOB}/rerun_from`,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({step,configs:cfgs})
  });
  if(!r.ok)alert((await r.json().catch(()=>({}))).detail||"重新生成失败");
}

// ---------- SSE ----------
function openSSE(){
  if(jobES)jobES.close();
  jobES=new EventSource(`${API}/api/jobs/${JOB}/stream`);
  jobES.onmessage=ev=>{ST=JSON.parse(ev.data);apply();};
}

function openQueueSSE(){
  if(queueES)queueES.close();
  queueES=new EventSource(`${API}/api/queue/stream`);
  queueES.onmessage=ev=>{QST=JSON.parse(ev.data);renderQueue();};
}

async function refreshQueue(){
  try{
    QST=await (await fetch(`${API}/api/queue`,{cache:"no-store"})).json();
    renderQueue();
  }catch(_){}
}

const QSTATUS={pending:"待点灯",running:"点灯中",done:"已点亮",error:"出错"};
function itemProgress(item){
  const steps=STEPS.map(s=>s.key);
  const done=steps.filter(k=>{
    if(item.job_id===JOB&&ST)return ST.steps[k].status==="done";
    return false;
  }).length;
  if(item.status==="done")return 100;
  if(item.status==="pending")return 0;
  if(item.status==="error")return Math.max(8,done/STEPS.length*100);
  const cur=steps.indexOf(item.current_step);
  const stepProg=(item.job_id===JOB&&ST&&item.current_step)?(ST.steps[item.current_step].progress||0):0;
  return Math.max(4,((Math.max(cur,0)+stepProg/100)/steps.length)*100);
}

function renderQueue(){
  const list=document.getElementById("queue-list"),sum=document.getElementById("qsum");
  if(!QST||!list)return;
  const items=QST.items||[];
  const pending=items.filter(x=>x.status==="pending").length;
  const done=items.filter(x=>x.status==="done").length;
  const canContinue=items.some(x=>x.status==="pending"||x.status==="error");
  const active=!!QST.running||items.some(x=>x.status==="running")||!!(ST&&ST.running);
  sum.textContent=`${items.length} 颗星 · ${done} 已点亮 · ${pending} 待点灯${QST.paused?" · 已暂停":""}`;
  document.getElementById("runqueue").disabled=active||!canContinue;
  document.getElementById("pausequeue").disabled=!active||!!QST.paused;
  document.getElementById("stopqueue").disabled=!active;
  document.getElementById("resumequeue").disabled=active||!canContinue;
  if(items.length&&!items.some(x=>x.job_id===JOB))selectJob(items[0].job_id);
  syncSelectedQueueUrl();
  if(!items.length){list.innerHTML='<div class="hint">星星队列还是空的。</div>';return;}
  list.innerHTML=items.map((it,i)=>{
    const name=esc(it.title||`待识别视频 ${i+1}`);
    const urlText=esc(shortUrl(it.url||""));
    const dur=it.estimate&&it.estimate.duration_sec?fmtDur(it.estimate.duration_sec):"--";
    const current=it.current_step?`当前：${esc((STEPS.find(s=>s.key===it.current_step)||{}).name||it.current_step)}`:(it.error?esc(it.error):"");
    const pct=itemProgress(it);
    return `<div class="qitem ${it.status} ${it.job_id===JOB?"active":""}" onclick="selectJob('${it.job_id}')">
      <div class="qtop"><div class="qidx">${i+1}</div><div class="qname">${name}${urlText?`<div class="qurl">${urlText}</div>`:""}</div><div class="qstatus">${QSTATUS[it.status]||it.status}</div></div>
      <div class="qmeta"><div>时长 ${dur}</div><div>生成时间 ${fmtDate(it.ended_at||it.created_at)}</div></div>
      ${current?`<div class="hint">${current}</div>`:""}
      <div class="qbar"><i style="width:${pct}%"></i></div>
      <div class="qtools">
        <button class="qtool" onclick="moveQueueItem('${it.id}',-1,event)" ${i===0||active?"disabled":""}>上移</button>
        <button class="qtool" onclick="moveQueueItem('${it.id}',1,event)" ${i===items.length-1||active?"disabled":""}>下移</button>
        <button class="qtool" onclick="deleteQueueItem('${it.id}',event)" ${it.status==="running"?"disabled":""}>删除</button>
        <button class="qtool" onclick="openOutput('${it.id}',event)" ${it.status!=="done"?"disabled":""}>打开输出</button>
        <button class="qtool ${it.uploaded?"uploaded":""}" onclick="markUploaded('${it.id}',event)" ${it.status!=="done"||it.uploaded?"disabled":""}>${it.uploaded?"已上传✓":"已上传"}</button>
      </div>
    </div>`;
  }).join("");
}

async function refreshArchives(){
  try{
    const d=await (await fetch(`${API}/api/archives`,{cache:"no-store"})).json();
    ARCHIVES=d.items||[];
    renderArchives();
  }catch(_){}
}

function startArchivePoll(){
  refreshArchives();
  setInterval(refreshArchives,5000);
}

function openArchiveLibrary(){
  const overlay=document.getElementById("archive-overlay");
  if(!overlay)return;
  overlay.classList.add("open");
  overlay.setAttribute("aria-hidden","false");
  document.body.classList.add("modal-open");
  renderArchives();
  refreshArchives();
}

function closeArchiveLibrary(){
  const overlay=document.getElementById("archive-overlay");
  if(!overlay)return;
  overlay.classList.remove("open");
  overlay.setAttribute("aria-hidden","true");
  document.body.classList.remove("modal-open");
}

document.addEventListener("keydown",ev=>{
  if(ev.key==="Escape")closeArchiveLibrary();
});

function archiveTime(ar){
  const raw=ar&&ar.created_at;
  if(typeof raw==="number")return raw;
  const parsed=Date.parse(raw||"");
  return Number.isFinite(parsed)?parsed/1000:0;
}

function sortedArchives(){
  const dir=ARCHIVE_SORT==="asc"?"asc":"desc";
  const sign=dir==="asc"?1:-1;
  return [...(ARCHIVES||[])].sort((a,b)=>sign*(archiveTime(a)-archiveTime(b)));
}

function setArchiveSort(dir){
  ARCHIVE_SORT=dir==="asc"?"asc":"desc";
  localStorage.setItem("archiveSort",ARCHIVE_SORT);
  renderArchives();
}

function renderArchives(){
  const gallery=document.getElementById("archive-gallery");
  const count=document.getElementById("archive-count"),libraryCount=document.getElementById("archive-library-count");
  const overlay=document.getElementById("archive-overlay");
  const items=sortedArchives();
  const sortText=ARCHIVE_SORT==="asc"?"按生成时间正序":"按生成时间倒序";
  const descBtn=document.getElementById("archive-sort-desc"),ascBtn=document.getElementById("archive-sort-asc");
  if(descBtn&&ascBtn){
    descBtn.classList.toggle("active",ARCHIVE_SORT!=="asc");
    ascBtn.classList.toggle("active",ARCHIVE_SORT==="asc");
    descBtn.setAttribute("aria-pressed",ARCHIVE_SORT!=="asc"?"true":"false");
    ascBtn.setAttribute("aria-pressed",ARCHIVE_SORT==="asc"?"true":"false");
  }
  if(count){
    count.textContent=`${items.length} 个已上传`;
  }
  if(libraryCount){
    libraryCount.textContent=`${items.length} 个已上传 · ${sortText}`;
  }
  if(!gallery||!overlay||!overlay.classList.contains("open"))return;
  if(!items.length){
    gallery.innerHTML='<div class="archive-empty">还没有上传归档。</div>';
    return;
  }
  gallery.innerHTML=items.map((ar,idx)=>{
    const enc=encodeURIComponent(ar.archive_dir||"");
    const title=ar.title||ar.full_title||ar.archive_dir;
    const seq=String(idx+1).padStart(2,"0");
    const seqLabel=`${seq}.`;
    const stamp=encodeURIComponent(ar.uploaded_at||ar.created_at||"");
    const cover=ar.has_cover?`${API}/api/archives/cover.png?archive_dir=${enc}&t=${stamp}`:"";
    return `<article class="archive-card">
      <div class="archive-cover ${cover?"":"empty"}">
        ${cover?`<img src="${cover}" alt="">`:"▦"}
        <div class="archive-uploaded">已上传</div>
      </div>
      <div class="archive-card-body">
        <div class="archive-name" title="${seqLabel} ${escAttr(title)}"><span class="archive-seq">${seqLabel}</span>${esc(title)}</div>
        <div class="archive-meta"><span>${fmtDateTime(ar.created_at)}</span><span>${fmtDur(ar.duration_sec||0)}</span></div>
        <div class="archive-actions">
          <button class="qtool" onclick="openArchive('${enc}',event)">打开输出</button>
        </div>
      </div>
    </article>`;
  }).join("");
}

function apply(){
  if(!ST)return;
  document.getElementById("runall").disabled=ST.running;
  document.getElementById("rerunall").disabled=ST.running;
  STEPS.forEach((step,i)=>{
    const k=step.key,info=ST.steps[k];
    const card=document.getElementById("card-"+k);
    card.classList.remove("done","running","error","ready");
    if(info.status!=="pending")card.classList.add(info.status);
    const prevDone=i===0||ST.steps[STEPS[i-1].key].status==="done";
    if(info.status==="pending"&&prevDone)card.classList.add("ready");
    document.getElementById("pl-"+k).textContent=BADGE[info.status];
    const est=document.getElementById("est-"+k);
    if(est){
      est.textContent=info.elapsed_sec?`已用 ${fmtDur(info.elapsed_sec)}`:"";
    }
    const rb=document.getElementById("rb-"+k);
    if(rb)rb.disabled=!!ST.running||!prevDone;
    const rr=document.getElementById("rr-"+k);
    if(rr)rr.disabled=!!ST.running||!prevDone;
    const running=(k===ST.current&&ST.running);
    // 进度环 + 头条
    const pc = running?info.progress : (info.status==="done"?100:info.progress);
    document.getElementById("rg-"+k).style.setProperty("--p",pc);
    document.getElementById("hb-"+k).style.width=(info.status==="done"?100:pc)+"%";
    document.getElementById("ic-"+k).innerHTML=info.status==="done"?'<span class="chk">✓</span>':running?'<span class="spin"></span>':(i+1);
    // 进度条 + 日志
    const bw=document.getElementById("bw-"+k);bw.classList.toggle("hide",!(running||info.progress>0&&info.status!=="done"));
    document.getElementById("bp-"+k).style.width=info.progress+"%";
    if(running&&!logOpen.has(k)){logOpen.add(k);syncLog(k);}
    if(logOpen.has(k)){const lg=document.getElementById("lg-"+k);
      lg.innerHTML=info.logs.length?info.logs.map(l=>`<div><span class="s">[${l.stage}]</span> ${esc(l.msg)}</div>`).join(""):`<div><span class="s">[state]</span> 暂无日志，步骤尚未开始。</div>`;
      lg.scrollTop=lg.scrollHeight;}
    // 错误
    const eb=document.getElementById("eb-"+k);
    if(info.status==="error"){eb.textContent="❌ "+(info.error||"出错");eb.classList.remove("hide");}else eb.classList.add("hide");
    // 顶部产线
    const sn=document.getElementById("sn-"+k);sn.classList.remove("done","running","error");
    if(info.status!=="pending")sn.classList.add(info.status);
    document.getElementById("sd-"+k).innerHTML=info.status==="done"?"✓":(i+1);
    if(i<STEPS.length-1){const sc=document.getElementById("sc-"+i);sc.classList.remove("flow","done");
      const nb=ST.steps[STEPS[i+1].key].status;
      if(info.status==="done"&&nb==="done")sc.classList.add("done");
      else if(info.status==="done"&&(nb==="running"||nb==="pending"))sc.classList.add("flow");}
    if(info.status==="done")document.getElementById("ptg-"+k).classList.remove("hide");
    if(k==="tts"&&info.status==="done"&&prev[k]!=="done")updateComposeAudioPreview(true);
    prev[k]=info.status;
  });
}

// ---------- 预览 ----------
async function loadPreview(key, open=false){
  const pv=document.getElementById("pv-"+key);if(!pv)return;
  document.getElementById("ptg-"+key).classList.remove("hide");
  if(open){pvOpen.add(key);syncPv(key);}
  if(key==="download")
    pv.innerHTML=`<div class="ptitle">下载完成</div>`+(ST.has_video?`<video controls src="${API}/api/jobs/${JOB}/source.mp4"></video>`:`<div class="hint">暂无视频画面。</div>`);
  else if(key==="asr"){const d=await (await fetch(`${API}/api/jobs/${JOB}/transcript`)).json();
    pv.innerHTML=`<div class="ptitle">识别结果（${d.segments.length} 段）</div><div class="list">${d.segments.map(s=>`<div class="cue"><span class="tc">${fmt(s.start)}</span><span>${esc(s.text)}</span></div>`).join("")}</div>`;}
  else if(key==="translate"){const d=await (await fetch(`${API}/api/jobs/${JOB}/translation`)).json();
    pv.innerHTML=`<div class="ptitle">翻译结果（${d.segments.length} 段）</div><div class="list">${d.segments.map(s=>`<div class="cue"><span class="tc">${fmt(s.start)}</span><span><div>${esc(s.zh)}</div><div class="en">${esc(s.text)}</div></span></div>`).join("")}</div>`;}
  else if(key==="tts")
    pv.innerHTML=`<div class="ptitle">配音音轨试听</div><div class="audio-shell"><audio controls preload="metadata" src="${API}/api/jobs/${JOB}/dub.wav?t=${Date.now()}"></audio></div>`;
  else if(key==="compose")
    pv.innerHTML=`<div class="ptitle">成片预览</div><video controls src="${API}/api/jobs/${JOB}/video.mp4?t=${Date.now()}"></video>
      <div><a class="dl" href="${API}/api/jobs/${JOB}/video.mp4?download=true">⬇ 下载 MP4</a>
      <a class="dl alt" href="${API}/api/jobs/${JOB}/sub?fmt=srt">⬇ 下载字幕</a></div>`;
  else if(key==="publish"){const m=await (await fetch(`${API}/api/jobs/${JOB}/metadata`)).json();
    pv.innerHTML=`<div class="ptitle">保存信息（已保存到 output）</div>
      <label>标题</label><input type="text" value="${(m.title||"").replace(/"/g,"&quot;")}">
      <label>简介</label><textarea>${esc(m.desc)}</textarea>
      <label>标签</label><div class="tags">${(m.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>
      <label>建议分区</label><input type="text" value="${esc(m.partition)} / TID ${esc(String(m.tid||""))}" style="max-width:420px">
      ${m.cover?`<label>封面</label><img class="cover" src="${API}/api/jobs/${JOB}/cover.png?t=${Date.now()}">`:""}
      ${m.archive_dir?`<label>归档目录</label><input type="text" value="${esc(m.archive_dir).replace(/"/g,"&quot;")}">`:""}
      <div><a class="dl" href="${API}/api/jobs/${JOB}/video.mp4?download=true">⬇ 下载成片</a></div>`;}
}

async function sample(ev){const v=document.getElementById("tts-voice").value;
  if(currentSampleAudio){currentSampleAudio.pause();currentSampleAudio.currentTime=0;currentSampleAudio=null;}
  if(currentSampleUrl){URL.revokeObjectURL(currentSampleUrl);currentSampleUrl="";}
  const fd=new FormData();fd.append("voice",v);fd.append("engine",curTtsEngineKey());
  const btn=ev.target;btn.disabled=true;btn.textContent="合成中…";
  try{const r=await fetch(`${API}/api/voice-sample`,{method:"POST",body:fd});if(!r.ok)throw 0;
    currentSampleUrl=URL.createObjectURL(await r.blob());
    const audio=new Audio(currentSampleUrl);
    const rate=Math.max(0.5,Math.min(2.0,+getSpeed()||1));
    audio.playbackRate=rate;
    audio.preservesPitch=true;
    audio.mozPreservesPitch=true;
    audio.webkitPreservesPitch=true;
    currentSampleAudio=audio;
    audio.onended=()=>{if(currentSampleAudio===audio)currentSampleAudio=null;};
    audio.play();
    refreshCurrentEngineSampleStatus();}catch(e){alert("试听失败");}
  btn.disabled=false;btn.textContent="🔊 试听";}
